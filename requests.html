<style>
/* ═══ REQUESTS-PAGE SPECIFIC ═══ */

/* Hero */
.req-hero {
  padding: 48px 40px 32px;
  border-bottom: 1px solid var(--line);
}
.req-hero .container { display: grid; grid-template-columns: 1fr auto; gap: 48px; align-items: end; }
.req-hero h1 {
  font-family: var(--serif); font-weight: 400;
  font-size: clamp(44px, 5vw, 68px);
  line-height: 0.98; letter-spacing: -0.035em;
}
.req-hero h1 em { font-style: italic; color: var(--a); }
.req-hero .meta { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; text-align: right; }
.req-hero .meta .count { font-family: var(--serif); font-size: 44px; font-weight: 400; letter-spacing: -0.02em; line-height: 1; }
.req-hero .meta .sub { font-size: 13px; color: var(--muted); }

/* Toolbar */
.toolbar {
  padding: 20px 40px;
  border-bottom: 1px solid var(--line);
  background: var(--paper);
  position: sticky; top: 77px; z-index: 50;
}
.toolbar-inner {
  max-width: 1400px; margin: 0 auto;
  display: grid; grid-template-columns: 1.3fr 1fr auto auto; gap: 14px;
  align-items: center;
}
.tb-field {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--paper);
  transition: border .15s;
}
.tb-field:focus-within { border-color: var(--ink); }
.tb-field svg { flex-shrink: 0; color: var(--muted); }
.tb-field input {
  flex: 1; border: 0; outline: 0; background: transparent;
  font-size: 14px; color: var(--ink);
}
.tb-field input::placeholder { color: var(--muted-2); }
.tb-field .label {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); margin-right: 4px;
}
.tb-sort {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 18px;
  border: 1px solid var(--line); border-radius: 999px;
  font-size: 13px; color: var(--ink); cursor: pointer;
}
.tb-post-btn {
  padding: 14px 22px;
  background: var(--a); color: #1A0E00;
  border-radius: 999px;
  font-size: 13px; font-weight: 700;
  display: inline-flex; align-items: center; gap: 8px;
  cursor: pointer; transition: opacity .13s;
}
.tb-post-btn:hover { opacity: .88; }

/* Category rail */
.cat-rail {
  padding: 18px 40px;
  border-bottom: 1px solid var(--line);
  overflow-x: auto; scrollbar-width: none;
}
.cat-rail::-webkit-scrollbar { display: none; }
.cat-rail-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; gap: 8px; flex-wrap: wrap;
}
.chip {
  padding: 8px 16px; border-radius: 999px;
  font-size: 13px; font-weight: 500;
  border: 1px solid var(--line); color: var(--muted);
  background: var(--paper); cursor: pointer; transition: all .13s;
  white-space: nowrap;
}
.chip:hover { border-color: var(--ink); color: var(--ink); }
.chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* Main body */
.req-body {
  max-width: 1400px; margin: 0 auto;
  padding: 40px 40px 80px;
}
.req-grid-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.req-grid-label { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.req-grid-count { font-family: var(--mono); font-size: 11px; color: var(--muted); }

/* Request cards grid */
.req-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

/* Individual card */
.req-card {
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: 14px;
  padding: 22px 22px 18px;
  display: flex; flex-direction: column; gap: 12px;
  transition: border-color .15s, transform .15s;
  cursor: pointer;
  text-decoration: none; color: inherit;
}
.req-card:hover { border-color: var(--ink); transform: translateY(-2px); }

.req-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.req-cat-tag {
  font-family: var(--mono); font-size: 9.5px;
  letter-spacing: 0.09em; text-transform: uppercase;
  padding: 4px 9px; border-radius: 5px;
  color: var(--ad); background: var(--as); border: 1px solid rgba(239,159,39,0.25);
  white-space: nowrap; flex-shrink: 0;
}
.req-age {
  font-family: var(--mono); font-size: 10px;
  color: var(--muted-2); white-space: nowrap;
}

.req-card-title {
  font-family: var(--serif); font-size: 18px; font-weight: 400;
  line-height: 1.25; letter-spacing: -0.02em; color: var(--ink);
}

.req-card-desc {
  font-size: 13.5px; color: var(--muted); line-height: 1.6;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

.req-card-meta {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  font-size: 12.5px; color: var(--muted);
}
.req-card-meta-item { display: flex; align-items: center; gap: 5px; }
.req-card-meta-item svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.req-card-meta-item strong { color: var(--ink-2); font-weight: 600; }

.req-card-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 12px; border-top: 1px solid var(--line);
  margin-top: auto;
}
.req-poster { display: flex; align-items: center; gap: 9px; }
.req-poster-av {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--as); border: 1px solid rgba(239,159,39,0.25);
  display: flex; align-items: center; justify-content:center;
  font-size: 10px; font-weight: 700; color: var(--ad); flex-shrink: 0;
}
.req-poster-name { font-size: 12.5px; font-weight: 600; color: var(--ink-2); }
.req-poster-sub  { font-size: 11px; color: var(--muted); }

.req-resp-badge {
  font-family: var(--mono); font-size: 10px;
  padding: 4px 10px; border-radius: 999px;
  background: var(--gs); color: var(--g); border: 1px solid rgba(8,80,65,.18);
  white-space: nowrap;
}
.req-resp-badge.none { background: var(--paper-2); color: var(--muted); border-color: var(--line); }

/* Prefs chips */
.req-prefs { display: flex; flex-wrap: wrap; gap: 5px; }
.req-pref {
  font-size: 11.5px; font-weight: 500;
  padding: 3px 9px; border-radius: 999px;
  background: var(--gs); color: var(--g); border: 1px solid rgba(8,80,65,.18);
}

/* Live dot */
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--a); display: inline-block;
  animation: pulse-a 2.5s ease-in-out infinite;
}
@keyframes pulse-a { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Empty state */
.req-empty {
  grid-column: 1 / -1;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  padding: 80px 0; text-align: center;
}
.req-empty svg { width: 36px; height: 36px; stroke: var(--muted); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.req-empty p { font-size: 14px; color: var(--muted); max-width: 260px; line-height: 1.6; }

/* Responsive */
@media (max-width: 768px) {
  .req-hero { padding: 32px 20px 24px; }
  .req-hero .container { grid-template-columns: 1fr; gap: 16px; }
  .req-hero .meta { align-items: flex-start; }
  .toolbar { padding: 14px 20px; }
  .toolbar-inner { grid-template-columns: 1fr auto; gap: 10px; }
  .tb-sort { display: none; }
  .cat-rail { padding: 14px 20px; }
  .req-body { padding: 24px 20px 60px; }
  .req-grid { grid-template-columns: 1fr; }
}
</style>

function getAllRequests() {
  try {
    const stored = JSON.parse(localStorage.getItem('sowo_r') || '[]');
    return [...stored, ...SEED_REQUESTS];
  } catch(e) { return SEED_REQUESTS; }
}

/* ══ Rendering ══ */
var activeCat = 'all';
var allRequests = [];

function buildCard(r) {
  const respCount = (r.responses || []).length;
  const prefsHtml = (r.prefs || []).slice(0, 3).map(p =>
    `<span class="req-pref">${p}</span>`).join('');
  return `
    <a class="req-card" href="request.html#${r.id}">
      <div class="req-card-top">
        <span class="req-cat-tag">${r.cat}</span>
        <span class="req-age">${r.age}</span>
      </div>
      <div class="req-card-title">${r.title}</div>
      <div class="req-card-desc">${r.desc || ''}</div>
      ${prefsHtml ? `<div class="req-prefs">${prefsHtml}</div>` : ''}
      <div class="req-card-meta">
        <div class="req-card-meta-item">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <strong>${r.loc}</strong>
        </div>
        ${r.budget ? `<div class="req-card-meta-item">
          <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          <strong>${r.budget}</strong>
        </div>` : ''}
      </div>
      <div class="req-card-foot">
        <div class="req-poster">
          <div class="req-poster-av">${r.posterInitials || (r.poster||'??').slice(0,2)}</div>
          <div>
            <div class="req-poster-name">${r.poster || 'Anonymous'}</div>
            <div class="req-poster-sub">Posted ${r.age}</div>
          </div>
        </div>
        <span class="req-resp-badge ${respCount === 0 ? 'none' : ''}">
          ${respCount === 0 ? 'No responses yet' : respCount + ' response' + (respCount > 1 ? 's' : '')}
        </span>
      </div>
    </a>`;
}

function renderGrid() {
  const what  = (document.getElementById('searchWhat')?.value || '').toLowerCase().trim();
  const where = (document.getElementById('searchWhere')?.value || '').toLowerCase().trim();

  const filtered = allRequests.filter(r => {
    const catMatch  = activeCat === 'all' || r.cat === activeCat;
    const whatMatch = !what || r.cat.toLowerCase().includes(what) || r.title.toLowerCase().includes(what) || (r.desc||'').toLowerCase().includes(what);
    const whereMatch= !where || (r.loc||'').toLowerCase().includes(where);
    return catMatch && whatMatch && whereMatch;
  });

  const grid = document.getElementById('reqGrid');
  const label = document.getElementById('gridLabel');
  const count = document.getElementById('gridCount');

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="req-empty">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <p>No requests match those filters. Try adjusting your search or <button onclick="openPostRequest()" style="background:none;border:none;padding:0;font:inherit;color:var(--g);font-weight:600;cursor:pointer;text-decoration:underline">post your own request</button>.</p>
      </div>`;
  } else {
    grid.innerHTML = filtered.map(buildCard).join('');
  }

  label.textContent = activeCat === 'all' ? 'All active requests' : activeCat + ' requests';
  count.textContent = filtered.length + ' showing';
  document.getElementById('heroCount').textContent = allRequests.length;
}

function setActiveCat(btn) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.dataset.cat;
  renderGrid();
}

function filterCards() { renderGrid(); }

/* Init */
allRequests = getAllRequests();
renderGrid();

/* ══ POST REQUEST FLOW (same logic as index.html) ══ */
var PR_STEP = 0;
var PR_DATA = {};
var PR_DRAFTS = [];
var PR_CATS = ['Beauty & Makeup','Hair Stylist','Nails','Barber','Cleaning','Private Chef','Photography','Moving','Tutoring','Childcare','Plumbing','Electrical','Other'];

function openPostRequest() {
  PR_STEP = 0; PR_DATA = {};
  try { PR_DRAFTS = JSON.parse(localStorage.getItem('sowo_request_drafts') || '[]'); } catch(e) { PR_DRAFTS = []; }
  prRender();
  document.getElementById('prOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closePostRequest() {
  document.getElementById('prOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function prCloseBg(e) {
  if (e.target === document.getElementById('prOverlay')) closePostRequest();
}
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape' && document.getElementById('prOverlay').classList.contains('open')) closePostRequest();
});
function prBack() { PR_STEP--; prRender(); }
function prPersist() {
  var g = function(id){ var el=document.getElementById(id); return el?el.value.trim():''; };
  if(g('prDesc'))   PR_DATA.desc     = g('prDesc');
  if(g('prLoc'))    PR_DATA.location = g('prLoc');
  if(g('prBudget')) PR_DATA.budget   = g('prBudget');
  if(g('prTiming')) PR_DATA.timing   = g('prTiming');
}
function prSelectCat(cat) {
  PR_DATA.category = cat;
  document.querySelectorAll('.pr-cat-btn').forEach(function(b){ b.classList.toggle('sel', b.dataset.cat===cat); });
  var nb=document.getElementById('prNextBtn0'); if(nb) nb.disabled=false;
}
function prRender() {
  var prog=document.getElementById('prProg');
  if(PR_STEP<3){
    prog.innerHTML=[0,1,2].map(function(i){ return '<div class="pr-p '+(i<PR_STEP?'done':i===PR_STEP?'active':'')+'" style="height:3px;flex:1;border-radius:999px;background:#e5e7eb;transition:background .3s"></div>'; }).join('');
    prog.style.display='flex';
  } else { prog.style.display='none'; }
  var body=document.getElementById('prBody');
  var titles=['What do you need?','A few more details','Review your request','Almost there'];
  document.getElementById('prTitle').textContent=titles[PR_STEP]||'Post a request';
  if(PR_STEP===0) body.innerHTML=prStep0();
  else if(PR_STEP===1) body.innerHTML=prStep1();
  else if(PR_STEP===2) body.innerHTML=prStep2();
  else body.innerHTML=prGate();
  if(PR_STEP===0&&PR_DATA.category){
    var btn=document.querySelector('.pr-cat-btn[data-cat="'+PR_DATA.category+'"]');
    if(btn) btn.classList.add('sel');
    var nb=document.getElementById('prNextBtn0'); if(nb) nb.disabled=false;
  }
}
function prStep0() {
  var q=PR_DRAFTS.length>0?'<div style="display:flex;align-items:center;gap:7px;background:#f0faf6;border:1px solid rgba(8,80,65,.18);border-radius:8px;padding:9px 13px;margin-bottom:16px;font-size:12.5px;color:#085041;font-weight:600;">✓ '+PR_DRAFTS.length+' request'+(PR_DRAFTS.length>1?'s':'')+' queued — <button onclick="PR_STEP=3;prRender()" style="background:none;border:none;padding:0;font:inherit;font-weight:700;color:#085041;cursor:pointer;text-decoration:underline;">publish all</button></div>':'';
  return q+'<p style="font-size:13.5px;color:#6b7280;margin-bottom:20px;line-height:1.55">Tell us what kind of help you\'re looking for.</p>'+
    '<div class="pr-field"><label>What category?</label><div class="pr-cats">'+
    PR_CATS.map(function(c){ return '<button class="pr-cat-btn" data-cat="'+c+'" onclick="prSelectCat(\''+c.replace(/'/g,"\\'")+'\')">' +c+'</button>'; }).join('')+
    '</div></div>'+
    '<div class="pr-field" style="margin-top:14px"><label>Describe what you need</label>'+
    '<textarea id="prDesc" placeholder="e.g. Looking for a makeup artist for my wedding in June…">'+(PR_DATA.desc||'')+'</textarea></div>'+
    '<div class="pr-actions"><button id="prNextBtn0" class="pr-btn-next" '+(PR_DATA.category?'':'disabled')+' onclick="prNextFromStep0()">Continue</button></div>';
}
function prNextFromStep0() { prPersist(); if(!PR_DATA.category) return; PR_STEP=1; prRender(); }
function prStep1() {
  return '<p style="font-size:13.5px;color:#6b7280;margin-bottom:20px;line-height:1.55">Help providers understand your needs.</p>'+
    '<div class="pr-field"><label>Your location</label><input id="prLoc" placeholder="e.g. Hackney, London" value="'+(PR_DATA.location||'')+'"></div>'+
    '<div class="pr-row">'+
    '<div class="pr-field"><label>Budget <span style="text-transform:none;letter-spacing:0;font-weight:400">(optional)</span></label><input id="prBudget" placeholder="e.g. £30–£60" value="'+(PR_DATA.budget||'')+'"></div>'+
    '<div class="pr-field"><label>Timing <span style="text-transform:none;letter-spacing:0;font-weight:400">(optional)</span></label><input id="prTiming" placeholder="e.g. This week" value="'+(PR_DATA.timing||'')+'"></div>'+
    '</div>'+
    '<div class="pr-actions"><button class="pr-btn-back" onclick="prBack()">Back</button><button class="pr-btn-next" onclick="prNextFromStep1()">Review request</button></div>';
}
function prNextFromStep1() {
  prPersist();
  if(!PR_DATA.location){ var el=document.getElementById('prLoc'); if(el){el.focus();el.style.borderColor='#ef4444';setTimeout(function(){el.style.borderColor='';},1800);} return; }
  PR_STEP=2; prRender();
}
function prStep2() {
  var rows=[['Category',PR_DATA.category||'—'],['Description',PR_DATA.desc||'—'],['Location',PR_DATA.location||'—']];
  if(PR_DATA.budget) rows.push(['Budget',PR_DATA.budget]);
  if(PR_DATA.timing) rows.push(['Timing',PR_DATA.timing]);
  return '<p style="font-size:13.5px;color:#6b7280;margin-bottom:20px;line-height:1.55">This is how your request will appear.</p>'+
    '<div class="pr-rev">'+rows.map(function(r){ return '<div class="pr-rev-row"><span class="pr-rk">'+r[0]+'</span><span class="pr-rv">'+r[1].replace(/</g,'&lt;')+'</span></div>'; }).join('')+'</div>'+
    '<div class="pr-actions" style="flex-direction:column;gap:8px">'+
    '<button class="pr-btn-next" style="width:100%" onclick="prSaveDraftAndGate()">Looks good — publish</button>'+
    '<button class="pr-btn-next" style="width:100%;background:#f9fafb;color:#085041;border:1.5px solid rgba(8,80,65,.25)" onclick="prSaveDraftAndAnother()">Save &amp; add another request</button>'+
    '<button class="pr-btn-back" style="align-self:flex-start" onclick="prBack()">Edit</button>'+
    '</div>';
}
function prSaveDraft() {
  try { var d=Object.assign({},PR_DATA,{id:'draft-'+Date.now(),savedAt:new Date().toISOString()}); PR_DRAFTS.push(d); localStorage.setItem('sowo_request_drafts',JSON.stringify(PR_DRAFTS)); } catch(e){}
}
function prSaveDraftAndGate(){ prSaveDraft(); PR_STEP=3; prRender(); }
function prSaveDraftAndAnother(){ prSaveDraft(); PR_DATA={}; PR_STEP=0; prRender(); }
function prGate() {
  var count=PR_DRAFTS.length;
  var signupUrl='/signup.html?next=post', loginUrl='/login.html?next=post';
  var listHtml=PR_DRAFTS.map(function(d,i){
    var desc=d.desc?d.desc.slice(0,50)+(d.desc.length>50?'…':''):'';
    return '<div style="display:flex;align-items:flex-start;gap:10px;padding:9px 0;'+(i<PR_DRAFTS.length-1?'border-bottom:1px solid #f3f4f6;':'')+'">'+
      '<div style="width:22px;height:22px;border-radius:50%;background:#085041;color:#9FE1CB;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">'+(i+1)+'</div>'+
      '<div><div style="font-size:13px;font-weight:700;color:#111">'+(d.category||'—')+(d.location?' · '+d.location:'')+'</div>'+(desc?'<div style="font-size:12px;color:#9ca3af;margin-top:1px">'+desc.replace(/</g,'&lt;')+'</div>':'')+'</div>'+
      '<button onclick="prRemoveDraft('+i+')" style="margin-left:auto;background:none;border:none;font-size:13px;color:#d1d5db;cursor:pointer;flex-shrink:0;padding:2px 4px" title="Remove">✕</button></div>';
  }).join('');
  return '<div class="pr-gate">'+
    '<div class="pr-gate-ic"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>'+
    '<div class="pr-gate-h">Almost there</div>'+
    '<p class="pr-gate-sub">Create a free account to publish '+(count===1?'your request':'your '+count+' requests')+'. Providers will reply directly.</p>'+
    '<div class="pr-gate-preview"><div class="pr-gate-preview-label">'+count+' request'+(count!==1?'s':'')+' ready to publish</div>'+listHtml+'</div>'+
    '<div class="pr-gate-btns">'+
    '<a href="'+signupUrl+'" class="pr-gate-create"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>Create free account &amp; publish</a>'+
    '<a href="'+loginUrl+'" class="pr-gate-signin">Already have an account? Sign in</a>'+
    '<button class="pr-gate-signin" style="border-style:dashed;cursor:pointer" onclick="prAddAnother()">+ Add another request</button>'+
    '</div>'+
    '<div class="pr-gate-note">Free to post. No card required. Your requests are saved — they\'ll publish as soon as you sign up.</div>'+
    '</div>';
}
function prRemoveDraft(i){ PR_DRAFTS.splice(i,1); try{localStorage.setItem('sowo_request_drafts',JSON.stringify(PR_DRAFTS));}catch(e){} if(PR_DRAFTS.length===0){PR_STEP=0;prRender();}else prRender(); }
function prAddAnother(){ PR_DATA={}; PR_STEP=0; prRender(); }
</script>

<script>
/* ── Auth nav state ── */
(function() {
  var raw = sessionStorage.getItem('sowo_session');
  if (!raw) return;
  try {
    var user = JSON.parse(raw);
    var name = user.firstName ? user.firstName+(user.lastName?' '+user.lastName:'') : (user.name||(user.email||'').split('@')[0]);
    var initials = name.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);
    var email = user.email||'';
    document.querySelectorAll('#nav-login-btn,#nav-cta-btn').forEach(function(b){b.style.display='none';});
    var userEl=document.getElementById('nav-user');
    if(userEl){userEl.style.display='flex';userEl.style.alignItems='center';}
    var av=document.getElementById('nav-av');
    if(av){
      var photo=localStorage.getItem('sowo_avatar_'+email);
      if(photo){av.style.backgroundImage='url('+photo+')';av.style.backgroundSize='cover';av.style.backgroundPosition='center';av.textContent='';}
      else{av.textContent=initials;}
      av.addEventListener('click',function(ev){ev.stopPropagation();document.getElementById('nav-dropdown').style.opacity==='1'?hideDropdown():showDropdown();});
      document.addEventListener('click',function(){hideDropdown();});
      document.getElementById('nav-dropdown').addEventListener('click',function(ev){ev.stopPropagation();});
    }
    function showDropdown(){var d=document.getElementById('nav-dropdown');d.style.opacity='1';d.style.pointerEvents='all';d.style.transform='translateY(0)';}
    function hideDropdown(){var d=document.getElementById('nav-dropdown');d.style.opacity='0';d.style.pointerEvents='none';d.style.transform='translateY(-6px)';}
    var so=document.getElementById('nav-signout-btn');
    if(so) so.addEventListener('click',function(){sessionStorage.removeItem('sowo_session');window.location.reload();});
  } catch(e){}
})();
</script>
