<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Sowo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--green:#085041;--teal:#1D9E75;--mint:#9FE1CB;--amber:#EF9F27;--black:#0A0A0A;--cream:#F5F0E8;--white:#fff;--t2:#666;--border:#E2E2E2;--ease:cubic-bezier(.16,1,.3,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--black);color:#fff;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none}

/* NAV */
.nav{height:64px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07)}
.logo{display:flex;align-items:center;gap:8px}
.logo-dot{width:28px;height:28px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-dot svg{width:16px;height:16px;fill:var(--mint)}
.logo-wm{font-family:Georgia,serif;font-size:18px;font-weight:700;color:#fff}
.nav-hint{font-size:13px;color:rgba(255,255,255,.4)}
.nav-hint a{color:var(--amber);font-weight:600}
.nav-hint a:hover{text-decoration:underline}

/* MAIN */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{width:100%;max-width:420px;background:#111;border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:40px 36px}
.card-title{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.card-sub{font-size:14px;color:rgba(255,255,255,.45);margin-bottom:32px}
.card-sub a{color:var(--amber);font-weight:600}

/* FORM */
.field{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:600;color:rgba(255,255,255,.55);margin-bottom:7px}
input[type=email],input[type=password],input[type=text]{
  width:100%;height:48px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.12);border-radius:10px;
  padding:0 14px;font-size:15px;font-family:inherit;color:#fff;
  transition:border-color .2s;outline:none;
}
input::placeholder{color:rgba(255,255,255,.25)}
input:focus{border-color:var(--teal)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,.35);font-size:14px;padding:4px}
.pw-toggle:hover{color:#fff}

.forgot{display:block;text-align:right;font-size:12px;color:rgba(255,255,255,.35);margin-top:6px;margin-bottom:20px}
.forgot:hover{color:var(--amber)}

.btn-submit{
  width:100%;height:50px;background:var(--amber);color:var(--black);
  border-radius:12px;font-size:15px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background .18s,transform .12s;
}
.btn-submit:hover{background:#D4891F}
.btn-submit:active{transform:scale(.97)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}

/* Spinner */
.spin{width:18px;height:18px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

.divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:rgba(255,255,255,.2);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}

.btn-google{
  width:100%;height:48px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:12px;font-size:14px;font-weight:600;color:rgba(255,255,255,.7);
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:background .18s,color .18s;
}
.btn-google:hover{background:rgba(255,255,255,.11);color:#fff}
.btn-google svg{width:18px;height:18px}

.error-msg{
  background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);
  border-radius:8px;padding:12px 14px;font-size:13px;color:#f88;
  margin-bottom:18px;display:none;
}
.error-msg.show{display:block}

/* FOOTER */
footer{text-align:center;padding:24px;font-size:12px;color:rgba(255,255,255,.2)}
footer a{color:rgba(255,255,255,.35)}footer a:hover{color:#fff}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="logo">
    <div class="logo-dot">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <span class="logo-wm">Sowo</span>
  </a>
  <span class="nav-hint">No account? <a href="/signup">Sign up free</a></span>
</nav>

<main>
  <div class="card">
    <h1 class="card-title">Welcome back</h1>
    <p class="card-sub">New to Sowo? <a href="/signup">Create a free account →</a></p>

    <div class="error-msg" id="err"></div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password">👁</button>
        </div>
        <a href="/forgot-password" class="forgot">Forgot password?</a>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Log in</button>
    </form>

    <div class="divider">or continue with</div>
    <button class="btn-google" id="googleBtn">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
  </div>
</main>

<footer>
  <a href="/privacy">Privacy</a> · <a href="/terms">Terms</a> · © 2025 Sowo Ltd
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/sowo.js"></script>
<script>
const form    = document.getElementById('loginForm');
const errEl   = document.getElementById('err');
const submitBtn = document.getElementById('submitBtn');
const pwToggle  = document.getElementById('pwToggle');
const pwInput   = document.getElementById('password');

// Show / hide password
pwToggle.addEventListener('click', () => {
  const show = pwInput.type === 'password';
  pwInput.type = show ? 'text' : 'password';
  pwToggle.textContent = show ? '🙈' : '👁';
});

// Form submit
form.addEventListener('submit', async e => {
  e.preventDefault();
  errEl.classList.remove('show');
  UI.setLoading(submitBtn, true);

  try {
    const email    = document.getElementById('email').value.trim();
    const password = pwInput.value;
    await Auth.signIn(email, password);

    // Redirect: back to where they came from, or dashboard
    const params   = new URLSearchParams(window.location.search);
    const redirect = params.get('redirect') || '/dashboard';
    window.location.href = redirect;

  } catch (err) {
    const msg = err.message || '';
    const isInvalidCreds = msg.toLowerCase().includes('invalid login') || msg.toLowerCase().includes('invalid credentials');
    if (isInvalidCreds) {
      errEl.innerHTML = `Wrong email or password — or your email isn't confirmed yet.
        <br><br>
        <a href="#" id="resendLink" style="color:var(--amber);font-weight:600;text-decoration:underline">Resend confirmation email →</a>`;
      errEl.classList.add('show');
      document.getElementById('resendLink').addEventListener('click', async e => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        if (!email) { UI.toast('Enter your email address first', 'error'); return; }
        const { error } = await sb.auth.resend({ type: 'signup', email });
        if (error) { UI.toast(error.message, 'error'); }
        else { UI.toast('Confirmation email resent — check your inbox', 'success'); }
      });
    } else {
      errEl.textContent = msg || 'Login failed. Please check your details.';
      errEl.classList.add('show');
    }
    UI.setLoading(submitBtn, false);
  }
});

// Google OAuth
document.getElementById('googleBtn').addEventListener('click', async () => {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options:  { redirectTo: window.location.origin + '/dashboard' }
  });
  if (error) UI.toast(error.message, 'error');
});

// Already logged in?
Auth.getUser().then(user => {
  if (user) window.location.href = '/dashboard';
});
</script>
</body>
</html>
