<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Sowo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,600;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --green:#085041;--teal:#0F766E;--mint:#9FE1CB;--mint-bg:#E8F5F0;
  --amber:#D97706;--amber-bg:#FEF3E0;--amber-dk:#92400E;
  --black:#0C0C0C;--white:#fff;--t1:#0C0C0C;--t2:#525252;--t3:#9E9E9E;
  --border:rgba(0,0,0,0.08);--surf:#F7F7F6;--card:#fff;
  --purple:#5B4FCF;--purple-light:#F0F0FF;--purple-mid:#7C6EE0;
  --accent:#0F766E;--accent-light:#E8F5F0;--accent-dark:#085041;
  --ease:cubic-bezier(.16,1,.3,1);
  --topbar-h:60px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:'Inter',-apple-system,sans-serif;background:#F7F7F6;color:var(--t1);min-height:100vh;display:flex;-webkit-font-smoothing:antialiased;font-feature-settings:"cv02","cv03","cv04","cv11"}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── SIDEBAR ── */
.sidebar{
  width:220px;flex-shrink:0;
  background:#fff;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  min-height:100vh;position:fixed;top:0;left:0;bottom:0;z-index:50;
}
.sidebar-logo{
  display:flex;align-items:center;gap:10px;
  height:var(--topbar-h);padding:0 20px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sidebar-logo svg{width:30px;height:28px;flex-shrink:0}
.sidebar-logo-text{font-family:'Lora',Georgia,serif;font-size:18px;font-weight:600;color:var(--black);letter-spacing:-.01em}
.sidebar-nav{flex:1;padding:8px 8px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:8px;
  font-size:13px;font-weight:500;color:var(--t3);
  cursor:pointer;transition:background .12s,color .12s;width:100%;text-align:left;
  position:relative;
}
.sb-item:hover{background:rgba(0,0,0,.04);color:var(--t1)}
.sb-item:hover svg{color:var(--t2)}
/* active — clean left-bar indicator (Linear/Notion style) */
.sb-item.active{
  background:rgba(8,80,65,.07);
  color:var(--green);font-weight:600;
}
.sb-item.active::before{
  content:'';position:absolute;left:0;top:6px;bottom:6px;
  width:3px;border-radius:0 3px 3px 0;background:var(--green);
}
.sb-item.active svg{color:var(--green)}
/* provider active — same approach */
.sb-item.active-light{background:rgba(8,80,65,.07);color:var(--green);font-weight:600}
.sb-item.active-light::before{
  content:'';position:absolute;left:0;top:6px;bottom:6px;
  width:3px;border-radius:0 3px 3px 0;background:var(--green);
}
.sb-item.active-light svg{color:var(--green)}
.sb-item svg{width:15px;height:15px;flex-shrink:0;color:rgba(0,0,0,.25);transition:color .12s}
.sb-divider{height:1px;background:var(--border);margin:6px 4px}
.sb-signout{
  display:flex;align-items:center;gap:10px;padding:9px 12px;
  font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;
  border-radius:9px;transition:all .13s;width:100%;
}
.sb-signout:hover{color:#EF4444;background:#FEF2F2}
.sb-signout svg{width:16px;height:16px;flex-shrink:0}
.sb-home-link{
  display:flex;align-items:center;gap:10px;padding:9px 12px;
  font-size:13px;font-weight:500;color:var(--t3);text-decoration:none;
  border-radius:9px;transition:all .13s;
}
.sb-home-link:hover{color:var(--green);background:var(--mint-bg)}
.sb-home-link svg{width:16px;height:16px;flex-shrink:0}
.sidebar-footer{padding:8px 10px 16px}

/* ── ROLE SWITCHER in sidebar ── */
.role-switch-wrap{
  margin:0 0 4px;padding:10px 12px;border-radius:12px;
  background:var(--surf);border:1px solid var(--border);
}
.rs-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.rs-current{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--t1);margin-bottom:8px}
.rs-current-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rs-current-dot.consumer{background:var(--teal)}
.rs-current-dot.provider{background:var(--amber)}
.rs-switch-btn{
  width:100%;height:30px;border-radius:7px;border:1.5px solid var(--border);
  font-size:11.5px;font-weight:600;color:var(--t2);background:#fff;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;
}
.rs-switch-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--mint-bg)}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:220px;right:0;z-index:40;
  height:var(--topbar-h);
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 28px;display:flex;align-items:center;justify-content:flex-end;gap:10px;
}
.notif-btn{
  width:36px;height:36px;border-radius:10px;background:var(--surf);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  position:relative;transition:background .15s;
}
.notif-btn:hover{background:#EBEBF0}
.notif-btn svg{width:17px;height:17px;color:var(--t2)}
.notif-dot{position:absolute;top:7px;right:7px;width:8px;height:8px;border-radius:50%;background:#EF4444;border:2px solid #fff}
.user-chip{
  display:flex;align-items:center;gap:8px;
  background:#fff;border:1px solid var(--border);
  border-radius:999px;padding:4px 12px 4px 4px;cursor:pointer;
  transition:border-color .15s;
}
.user-chip:hover{border-color:#C0C0C8}
.user-av{
  width:30px;height:30px;border-radius:50%;
  background:var(--green);display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:var(--mint);flex-shrink:0;overflow:hidden;
}
.user-av img{width:100%;height:100%;object-fit:cover}
.user-chip-name{font-size:13px;font-weight:600;color:var(--t1)}
.chip-caret{width:14px;height:14px;color:var(--t3)}

/* ── USER DROPDOWN ── */
.user-chip-wrap{position:relative}
.user-dropdown{
  position:absolute;top:calc(100% + 8px);right:0;
  background:#fff;border:1px solid var(--border);border-radius:14px;
  box-shadow:0 8px 32px rgba(0,0,0,.12);padding:6px;min-width:200px;
  z-index:200;display:none;
}
.user-dropdown.open{display:block}
.ud-header{padding:10px 12px 8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.ud-name{font-size:13px;font-weight:700;color:var(--t1)}
.ud-email{font-size:11.5px;color:var(--t3);margin-top:1px;word-break:break-all}
.ud-item{
  display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;
  font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;
  transition:background .13s;width:100%;text-align:left;
}
.ud-item:hover{background:var(--surf);color:var(--t1)}
.ud-item svg{width:15px;height:15px;flex-shrink:0;color:var(--t3)}
.ud-item.danger{color:#EF4444}
.ud-item.danger svg{color:#EF4444}
.ud-item.danger:hover{background:#FEF2F2}
.ud-divider{height:1px;background:var(--border);margin:4px 0}

/* ── PAGE LAYOUT ── */
.page{margin-left:220px;flex:1;min-height:100vh;display:flex;flex-direction:column;min-width:0;padding-top:var(--topbar-h)}

/* ════════════════════════════════════════
   CONSUMER DASHBOARD
════════════════════════════════════════ */

/* Hero banner — clean, confident, no decoration */
.c-hero{
  background:#085041;
  padding:40px 32px 40px;position:relative;overflow:hidden;
}
.c-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 100% at 100% 50%,rgba(255,255,255,.04) 0%,transparent 60%);
  pointer-events:none;
}
.c-hero-inner{position:relative;z-index:1}
.c-hero-inner h1{
  font-size:26px;font-weight:700;color:#fff;line-height:1.3;
  letter-spacing:-.03em;margin-bottom:6px;
}
.c-hero-inner p{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:20px;letter-spacing:.01em}
.c-chips{display:flex;flex-wrap:wrap;gap:7px}
.c-chip{
  height:28px;padding:0 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);
  font-size:12px;font-weight:600;color:#fff;display:inline-flex;align-items:center;gap:4px;
}
.c-chip b{color:rgba(255,255,255,.6);font-weight:400}

/* Consumer body */
.c-body{padding:24px 28px 48px;display:flex;gap:24px;align-items:flex-start}
.c-main{flex:1;min-width:0}
.c-aside{width:244px;flex-shrink:0;position:sticky;top:calc(var(--topbar-h) + 20px)}
/* Section label — matches homepage board-col-title */
.c-section-title{
  font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--t3);margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;
}

/* Trust profile panel — same card language as listing page */
.trust-widget{
  background:#fff;border:1px solid var(--border);border-radius:14px;
  padding:20px;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 3px 10px rgba(0,0,0,.04);
}
.tw-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:16px}
.tw-row{margin-bottom:14px}
.tw-label{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.tw-val{font-size:13.5px;font-weight:600;color:var(--t1);letter-spacing:-.01em}
.tw-edit{
  width:100%;height:34px;border-radius:7px;border:1px solid var(--border);
  font-size:12px;font-weight:500;color:var(--t2);background:#fff;
  cursor:pointer;margin-top:4px;transition:border-color .12s,color .12s;
}
.tw-edit:hover{border-color:rgba(0,0,0,.18);color:var(--t1)}

/* Match cards — same card language as listing page */
.match-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:28px}
.match-card{
  background:#fff;border:1px solid var(--border);border-radius:14px;
  padding:18px;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 3px 10px rgba(0,0,0,.04);
  transition:box-shadow .2s,transform .2s;
}
.match-card:hover{
  box-shadow:0 2px 4px rgba(0,0,0,.05),0 8px 24px rgba(0,0,0,.08);
  transform:translateY(-2px);
}
.mc-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
/* Avatar — matches listing page card-av exactly */
.mc-av{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  background:#EFEFEE;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#525252;
}
.mc-av.av-0,.pm-av.av-0,
.mc-av.av-1,.pm-av.av-1,
.mc-av.av-2,.pm-av.av-2,
.mc-av.av-3,.pm-av.av-3,
.mc-av.av-4,.pm-av.av-4 { background:#EFEFEE; color:#525252 }
.mc-name{font-size:13.5px;font-weight:600;color:var(--t1);line-height:1.3;letter-spacing:-.01em}
.mc-role{font-size:11.5px;color:var(--t3);margin-top:1px}

/* Trust score bar */
.ts-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ts-label{font-size:11px;font-weight:600;color:var(--t3);white-space:nowrap;letter-spacing:.02em}
.ts-val{font-size:11px;font-weight:700;color:var(--t2)}
.ts-bar{flex:1;height:3px;background:rgba(0,0,0,.07);border-radius:999px;overflow:hidden}
.ts-fill{height:100%;border-radius:999px;background:var(--green)}
.ts-badge{font-size:10px;font-weight:600;color:var(--t3);white-space:nowrap}

/* Checks */
.mc-checks{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.mc-check{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--t2);font-weight:400}
.mc-check .ck{width:13px;height:13px;color:var(--green);flex-shrink:0}
.mc-check .ck-star{color:var(--amber)}

/* Explanation */
.mc-explain{
  background:var(--surf);border-radius:8px;
  padding:9px 10px;margin-bottom:10px;
  display:flex;gap:7px;align-items:flex-start;
}
.mc-explain svg{width:12px;height:12px;color:var(--t3);flex-shrink:0;margin-top:1px}
.mc-explain p{font-size:10.5px;color:var(--t2);line-height:1.5}

.mc-respond{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);margin-bottom:12px}
.mc-respond svg{width:12px;height:12px}

.mc-actions{display:flex;gap:8px}
.btn-outline-sm{
  height:30px;padding:0 12px;border-radius:7px;
  border:1px solid var(--border);font-size:12px;font-weight:500;color:var(--t2);
  background:#fff;cursor:pointer;transition:border-color .12s,color .12s;
}
.btn-outline-sm:hover{border-color:rgba(0,0,0,.18);color:var(--t1)}
.btn-purple-sm{
  height:30px;padding:0 12px;border-radius:7px;font-size:12px;font-weight:600;
  color:#fff;background:var(--green);cursor:pointer;transition:background .12s;
}
.btn-purple-sm:hover{background:#063D31}

/* People like you chose */
.plc-pills{display:flex;flex-wrap:wrap;gap:8px}
.plc-pill{
  display:inline-flex;align-items:center;gap:8px;padding:10px 16px;
  border-radius:12px;border:1px solid var(--border);background:#fff;
  font-size:12px;font-weight:600;color:var(--t2);
  cursor:pointer;transition:all .15s;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.plc-pill:hover{border-color:var(--teal);color:var(--teal)}
.plc-ico{font-size:16px}

/* ════════════════════════════════════════
   PROVIDER DASHBOARD
════════════════════════════════════════ */
.p-page{padding:32px;display:flex;gap:24px;align-items:flex-start}
.p-main{flex:1;min-width:0}
.p-aside{width:265px;flex-shrink:0}

.p-header{margin-bottom:28px}
.p-header h1{font-size:22px;font-weight:700;letter-spacing:-.03em;color:var(--t1)}
.p-header p{font-size:13px;color:var(--t3);margin-top:4px;letter-spacing:.01em}
.p-header-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.p-header-actions{display:flex;gap:8px}
.btn-share-profile{
  height:36px;padding:0 16px;border-radius:9px;border:1.5px solid var(--border);
  font-size:12.5px;font-weight:600;color:var(--t2);background:#fff;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:border-color .15s;
}
.btn-share-profile:hover{border-color:var(--teal);color:var(--teal)}

/* Stat cards */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{
  background:#fff;border:1px solid var(--border);border-radius:14px;
  padding:22px 22px 20px;
  box-shadow:0 1px 2px rgba(0,0,0,.04), 0 3px 12px rgba(0,0,0,.04);
  transition:box-shadow .22s,transform .22s;
}
.stat-card:hover{
  box-shadow:0 1px 4px rgba(0,0,0,.05), 0 8px 24px rgba(0,0,0,.07);
  transform:translateY(-2px);
}
.stat-icon{
  width:36px;height:36px;border-radius:9px;margin-bottom:18px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.stat-icon svg{width:16px;height:16px}
.stat-icon.green{background:var(--surf)}
.stat-icon.green svg{stroke:var(--green)}
.stat-icon.amber{background:var(--surf)}
.stat-icon.amber svg{stroke:#92400E}
.stat-icon.teal{background:var(--surf)}
.stat-icon.teal svg{stroke:var(--teal)}
.stat-icon.blue{background:var(--surf)}
.stat-icon.blue svg{stroke:#374151}
.stat-label{font-size:11px;font-weight:600;color:var(--t3);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.stat-val{font-size:34px;font-weight:800;letter-spacing:-.8px;color:var(--t1);line-height:1}
.stat-sub{font-size:11.5px;color:var(--t3);margin-top:6px}
.stat-star{color:var(--amber);font-size:15px;margin-right:3px}
.stat-excel{font-size:11.5px;font-weight:700;color:var(--teal);margin-top:4px}

/* Section heading — matches listing page board-col-title */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-head h2{
  font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);
}
.sec-head a{font-size:12px;color:var(--t3);font-weight:500;transition:color .12s}
.sec-head a:hover{color:var(--t2)}

/* Provider match cards — 3 col, same card language as listing page */
.pm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.pm-card{
  background:#fff;border:1px solid var(--border);border-radius:14px;
  padding:16px;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 3px 10px rgba(0,0,0,.04);
  transition:box-shadow .2s,transform .2s;
}
.pm-card:hover{
  box-shadow:0 2px 4px rgba(0,0,0,.05),0 8px 24px rgba(0,0,0,.08);
  transform:translateY(-2px);
}
.pm-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
/* Avatar — matches listing page card-av */
.pm-av{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  background:#EFEFEE;color:#525252;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
  overflow:hidden;
}
.pm-av img{width:100%;height:100%;object-fit:cover}
.pm-name{font-size:13.5px;font-weight:600;color:var(--t1);letter-spacing:-.01em}
.pm-job{font-size:11.5px;color:var(--t3);margin-top:1px}
.pm-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.pm-tag{
  padding:3px 8px;border-radius:5px;border:1px solid var(--border);
  font-size:10px;font-weight:500;color:var(--t3);background:var(--surf);
}
.pm-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:600;color:var(--t2);margin-bottom:8px;
}
.pm-badge-dot{
  width:6px;height:6px;border-radius:50%;background:#10B981;
  flex-shrink:0;
}
.pm-badge-dot svg{display:none}
.pm-explain{
  background:var(--surf);border-radius:8px;
  padding:8px 10px;margin-bottom:10px;display:flex;gap:7px;align-items:flex-start;
}
.pm-explain svg{width:11px;height:11px;color:var(--t3);flex-shrink:0;margin-top:1px}
.pm-explain p{font-size:10.5px;color:var(--t2);line-height:1.5}
.pm-actions{display:flex;gap:7px}
.btn-ghost{
  height:28px;padding:0 10px;border-radius:6px;border:1px solid var(--border);
  font-size:11.5px;font-weight:500;color:var(--t2);background:#fff;cursor:pointer;transition:border-color .12s,color .12s;
}
.btn-ghost:hover{border-color:rgba(0,0,0,.18);color:var(--t1)}
.btn-green-sm{
  height:28px;padding:0 10px;border-radius:6px;font-size:11.5px;font-weight:600;
  color:#fff;background:var(--green);cursor:pointer;transition:background .12s;
}
.btn-green-sm:hover{background:#063D31}

/* Pipeline */
.pipe-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.pipe-tile{
  background:#fff;border:1px solid var(--border);border-radius:14px;
  padding:16px 18px;
  box-shadow:0 1px 3px rgba(0,0,0,.04),0 3px 10px rgba(0,0,0,.04);
  transition:box-shadow .18s,transform .18s;
}
.pipe-tile:hover{
  box-shadow:0 2px 6px rgba(0,0,0,.05),0 8px 22px rgba(0,0,0,.07);
  transform:translateY(-1px);
}
.pipe-label{font-size:11px;font-weight:700;color:var(--t3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.pipe-val{font-size:26px;font-weight:900;letter-spacing:-.5px;color:var(--t1)}

/* Trust insights — same card language as listing page */
.ti-card{
  background:#fff;border:1px solid var(--border);border-radius:14px;
  padding:20px;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 3px 10px rgba(0,0,0,.04);
}
.ti-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:16px}
.ti-row{padding:0 0 12px}
.ti-row-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ti-name{font-size:12px;font-weight:500;color:var(--t2)}
.ti-val{font-size:12px;font-weight:600;color:var(--t1)}
.ti-bar{height:3px;background:rgba(0,0,0,.07);border-radius:999px;overflow:hidden;margin-bottom:0}
.ti-bar-fill{height:100%;border-radius:999px;background:var(--green)}
.ti-chart-wrap{margin:14px 0 10px}
.ti-chart-label{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.sparkline{width:100%;height:48px}
.ti-desc{font-size:12px;color:var(--t3);line-height:1.65;margin-bottom:12px}
.ti-checklist{display:flex;flex-direction:column;gap:8px}
.ti-check-item{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;color:var(--t2)}
.ti-check-item svg{width:14px;height:14px;color:var(--green);flex-shrink:0}

/* Empty */
.empty-box{
  background:#fff;border:1px dashed var(--border);border-radius:14px;
  padding:40px 24px;text-align:center;
}
.empty-ico{font-size:32px;margin-bottom:10px}
.empty-box h3{font-size:15px;font-weight:700;margin-bottom:5px}
.empty-box p{font-size:13px;color:var(--t3);margin-bottom:16px}

/* ── SECTION PAGES (non-hero views) ── */
.section-page{padding:28px}
.section-page h1{
  font-size:22px;font-weight:700;letter-spacing:-.03em;margin-bottom:4px;color:var(--t1);
}
.section-page .sub{font-size:13px;color:var(--t3);margin-bottom:24px}

/* Booking list cards — same card language as listing page */
.bk-list{display:flex;flex-direction:column;gap:10px}
.bk-card{
  background:#fff;border:1px solid var(--border);border-radius:14px;
  padding:16px 20px;display:flex;align-items:center;gap:14px;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 3px 10px rgba(0,0,0,.04);
  transition:box-shadow .2s,transform .2s;
}
.bk-card:hover{
  box-shadow:0 2px 4px rgba(0,0,0,.05),0 8px 24px rgba(0,0,0,.08);
  transform:translateY(-1px);
}
/* Booking avatar — matches listing card-av */
.bk-av{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;background:#EFEFEE;color:#525252;
}
.bk-info{flex:1;min-width:0}
.bk-name{font-size:14px;font-weight:700;color:var(--t1)}
.bk-service{font-size:12px;color:var(--t2);margin-top:1px}
.bk-date{font-size:11px;color:var(--t3);margin-top:3px}
.bk-status{
  padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600;
  white-space:nowrap;flex-shrink:0;letter-spacing:.02em;
}
.bk-status.pending{background:rgba(0,0,0,.05);color:var(--t2)}
.bk-status.confirmed{background:rgba(8,80,65,.08);color:var(--green)}
.bk-status.completed{background:rgba(0,0,0,.05);color:var(--t3)}
.bk-status.cancelled{background:rgba(220,38,38,.07);color:#B91C1C}
.bk-status.in_progress{background:rgba(8,80,65,.06);color:var(--green)}
.bk-actions{display:flex;gap:8px;flex-shrink:0}

/* Vouch/review cards */
.vouch-list{display:flex;flex-direction:column;gap:12px}
.vouch-card{
  background:#fff;border:1px solid var(--border);border-radius:14px;
  padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.vouch-head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.vouch-name{font-size:13px;font-weight:700;color:var(--t1)}
.vouch-date{font-size:11px;color:var(--t3);margin-top:1px}
.vouch-stars{color:var(--amber);font-size:14px;letter-spacing:1px}
.vouch-text{font-size:13px;color:var(--t2);line-height:1.6;font-style:italic}

/* Modal overlay */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(2px);
}
.modal-overlay.hidden{display:none}
.modal{
  background:#fff;border-radius:20px;padding:28px;width:100%;max-width:460px;
  box-shadow:0 24px 64px rgba(0,0,0,.18);
}
.modal h2{font-size:18px;font-weight:800;margin-bottom:4px}
.modal .modal-sub{font-size:13px;color:var(--t2);margin-bottom:20px}
.modal label{display:block;font-size:12px;font-weight:700;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.modal input,.modal textarea,.modal select{
  width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;
  font-family:inherit;font-size:13px;color:var(--t1);background:#fff;
  outline:none;transition:border-color .15s;margin-bottom:14px;
}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--teal)}
.modal textarea{resize:vertical;min-height:80px}
.modal-actions{display:flex;gap:10px;margin-top:6px}
.modal-actions .btn-cancel{
  flex:1;height:40px;border:1px solid var(--border);border-radius:10px;
  font-size:13px;font-weight:600;color:var(--t2);background:#fff;cursor:pointer;
}
.modal-actions .btn-confirm{
  flex:2;height:40px;border-radius:10px;
  font-size:13px;font-weight:700;color:var(--mint);background:var(--green);cursor:pointer;
  border:none;transition:background .15s;
}
.modal-actions .btn-confirm:hover{background:#063D31}
.modal-actions .btn-confirm:disabled{opacity:.6;cursor:default}

/* Notif badge */
.notif-count{
  position:absolute;top:-3px;right:-3px;
  min-width:16px;height:16px;border-radius:999px;
  background:#EF4444;border:2px solid #fff;
  font-size:9px;font-weight:800;color:#fff;
  display:flex;align-items:center;justify-content:center;padding:0 3px;
}
.notif-btn{position:relative}

/* Accept / Decline inline */
.pm-ad{display:flex;gap:7px;margin-top:8px}
.btn-accept{
  flex:1;height:28px;border-radius:6px;font-size:11.5px;font-weight:600;
  color:#fff;background:var(--green);border:none;cursor:pointer;transition:background .12s;
}
.btn-accept:hover{background:#063D31}
.btn-decline{
  height:28px;padding:0 10px;border-radius:6px;font-size:11.5px;font-weight:500;
  color:var(--t2);background:rgba(0,0,0,.05);border:1px solid var(--border);cursor:pointer;transition:background .12s;
}
.btn-decline:hover{background:rgba(0,0,0,.08)}
.btn-accept:disabled,.btn-decline:disabled{opacity:.4;cursor:default}

/* ── ROLE PICKER ── */
.role-pick-screen {
  position:fixed;inset:0;background:#fff;z-index:300;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
}
.role-pick-logo {
  display:flex;align-items:center;gap:9px;margin-bottom:52px;
}
.role-pick-logo span {font-family:'Lora',Georgia,serif;font-size:20px;font-weight:600;color:var(--t1)}
.role-pick-h { font-family:'Lora',Georgia,serif;font-size:28px;font-weight:600;color:var(--t1);text-align:center;margin-bottom:8px;letter-spacing:-.02em }
.role-pick-sub { font-size:14px;color:var(--t3);text-align:center;margin-bottom:40px }
.role-pick-cards { display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:560px;width:100% }
.role-card {
  flex:1;min-width:220px;max-width:256px;
  background:#fff;border:1px solid var(--border);border-radius:16px;
  padding:28px 24px;cursor:pointer;transition:all .18s;text-align:left;
  display:flex;flex-direction:column;gap:0;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 3px 10px rgba(0,0,0,.04);
}
.role-card:hover { border-color:rgba(0,0,0,.18);box-shadow:0 2px 4px rgba(0,0,0,.05),0 8px 24px rgba(0,0,0,.08);transform:translateY(-2px) }
.role-card.selected { border-color:var(--green);box-shadow:0 2px 4px rgba(0,0,0,.05),0 8px 24px rgba(8,80,65,.12) }
.role-card-icon {
  width:40px;height:40px;border-radius:10px;margin-bottom:18px;
  display:flex;align-items:center;justify-content:center;background:var(--surf);
}
.role-card-icon svg { width:20px;height:20px }
.role-card-icon.c svg { stroke:var(--green) }
.role-card-icon.p svg { stroke:var(--t2) }
.role-card h3 { font-size:15px;font-weight:600;color:var(--t1);margin-bottom:6px;letter-spacing:-.01em }
.role-card p  { font-size:13px;color:var(--t3);line-height:1.6 }
.role-pick-btn {
  margin-top:28px;height:46px;padding:0 36px;border-radius:10px;
  background:var(--green);color:#fff;border:none;
  font-size:14px;font-weight:600;cursor:pointer;
  opacity:.35;pointer-events:none;transition:all .2s;
  box-shadow:0 1px 2px rgba(0,0,0,.10),0 4px 12px rgba(8,80,65,.22);
}
.role-pick-btn.ready { opacity:1;pointer-events:auto }
.role-pick-btn.ready:hover { background:#063D31 }

/* ════════════════════════════════════════
   CONSUMER HOME — new design
════════════════════════════════════════ */
.ch-page{display:flex;flex-direction:column;min-height:100%}
.ch-header{
  padding:32px 28px 20px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;
}
.ch-greeting{
  font-family:'Lora',Georgia,serif;
  font-size:28px;font-weight:600;letter-spacing:-.02em;color:var(--t1);margin-bottom:5px;
}
.ch-sub{font-size:13.5px;color:var(--t3)}
.ch-filter-chips{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  background:var(--surf);border:1px solid var(--border);
  border-radius:12px;padding:10px 14px;flex-shrink:0;
}
.ch-chip{
  font-size:12px;font-weight:600;color:var(--t2);
  padding:4px 10px;border-radius:6px;background:#fff;border:1px solid var(--border);
}
.ch-edit-prefs{
  font-size:12px;font-weight:600;color:var(--teal);
  padding:4px 10px;border-radius:6px;border:1px solid rgba(15,118,110,.2);
  background:rgba(15,118,110,.06);cursor:pointer;transition:background .13s;
}
.ch-edit-prefs:hover{background:rgba(15,118,110,.12)}
.ch-upcoming{
  margin:0 28px 20px;background:#fff;
  border:1.5px solid var(--border);border-radius:14px;
  padding:14px 20px;display:flex;align-items:center;gap:14px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
  cursor:pointer;transition:box-shadow .18s;
}
.ch-upcoming:hover{box-shadow:0 2px 10px rgba(0,0,0,.07)}
.ch-upcoming-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 0 3px rgba(8,80,65,.12)}
.ch-upcoming-label{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.ch-upcoming-text{font-size:13px;font-weight:600;color:var(--t1)}
.ch-upcoming-arrow{margin-left:auto;color:var(--t3);flex-shrink:0}
.ch-body{display:flex;gap:24px;padding:0 28px 48px;align-items:flex-start}
.ch-main{flex:1;min-width:0}
.ch-sidebar{width:240px;flex-shrink:0;position:sticky;top:calc(var(--topbar-h) + 16px)}
.ch-sec{margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.ch-sec-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.ch-sec-count{font-size:12px;color:var(--t3);font-weight:500}

/* Provider cards — clean, marketplace style */
.pcard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:32px}
.pcard{
  background:#fff;border:1px solid var(--border);border-radius:16px;
  padding:20px;display:flex;flex-direction:column;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 3px 10px rgba(0,0,0,.04);
  transition:box-shadow .2s,transform .2s;
}
.pcard:hover{
  box-shadow:0 2px 6px rgba(0,0,0,.06),0 10px 28px rgba(0,0,0,.08);
  transform:translateY(-2px);
}
.pcard-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.pcard-av-wrap{position:relative;flex-shrink:0}
.pcard-av{
  width:54px;height:54px;border-radius:50%;flex-shrink:0;
  background:var(--green);
  display:flex;align-items:center;justify-content:center;
  font-family:'Lora',Georgia,serif;font-size:19px;font-weight:600;color:#fff;
  overflow:hidden;
}
.pcard-av img{width:100%;height:100%;object-fit:cover}
.pcard-online{
  position:absolute;bottom:2px;right:2px;
  width:11px;height:11px;border-radius:50%;
  background:#22C55E;border:2px solid #fff;
}
.pcard-info{flex:1;min-width:0}
.pcard-name{font-size:14.5px;font-weight:700;color:var(--t1);letter-spacing:-.01em;margin-bottom:2px}
.pcard-cat{font-size:12px;color:var(--t3);margin-bottom:5px}
.pcard-rating{display:flex;align-items:center;gap:4px}
.pcard-star{color:var(--amber);font-size:13px}
.pcard-rval{font-size:12px;font-weight:700;color:var(--t1)}
.pcard-rcnt{font-size:11.5px;color:var(--t3)}
.pcard-save{
  width:30px;height:30px;flex-shrink:0;border-radius:8px;
  border:1px solid var(--border);background:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:border-color .13s;color:var(--t3);
}
.pcard-save:hover{border-color:rgba(0,0,0,.2);color:#EF4444}
.pcard-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.pcard-chip{
  font-size:11px;font-weight:500;color:var(--t2);
  padding:3px 8px;border-radius:5px;background:var(--surf);border:1px solid var(--border);
}
.pcard-chip.match{color:var(--teal);background:rgba(15,118,110,.06);border-color:rgba(15,118,110,.16)}
.pcard-actions{
  display:flex;gap:8px;margin-top:auto;
  padding-top:14px;border-top:1px solid var(--border);
}
.pcard-btn-book{
  flex:1;height:38px;border-radius:9px;
  background:var(--amber);color:#1A0900;
  font-size:13px;font-weight:700;letter-spacing:-.01em;
  border:none;cursor:pointer;
  box-shadow:0 2px 8px rgba(217,119,6,.22);
  transition:transform .15s var(--ease),box-shadow .15s;
}
.pcard-btn-book:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(217,119,6,.32)}
.pcard-btn-view{
  height:38px;padding:0 14px;border-radius:9px;
  border:1.5px solid var(--border);background:#fff;
  font-size:12.5px;font-weight:600;color:var(--t1);
  cursor:pointer;transition:border-color .13s;
}
.pcard-btn-view:hover{border-color:rgba(0,0,0,.2)}

/* Discovery pills */
.ch-discover{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:48px}
.ch-cat-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 16px;border-radius:999px;
  border:1px solid var(--border);background:#fff;
  font-size:13px;font-weight:500;color:var(--t1);
  cursor:pointer;transition:all .15s;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.ch-cat-pill:hover{border-color:var(--green);color:var(--green);background:rgba(8,80,65,.03)}
.ch-trust-widget{
  background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 3px 10px rgba(0,0,0,.04);
}

/* ════════════════════════════════════════
   PROVIDER DASHBOARD — new design
════════════════════════════════════════ */
.pd-page{padding:28px 32px 48px}
.pd-greeting-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;flex-wrap:wrap;gap:12px;
}
.pd-greeting{
  font-family:'Lora',Georgia,serif;font-size:26px;font-weight:600;
  letter-spacing:-.02em;color:var(--t1);margin-bottom:4px;
}
.pd-date{font-size:13px;color:var(--t3)}
.pd-greeting-right{display:flex;gap:8px}
.p-btn-primary{
  height:38px;padding:0 16px;border-radius:9px;
  border:1.5px solid var(--border);background:#fff;
  font-size:13px;font-weight:600;color:var(--t1);
  display:inline-flex;align-items:center;gap:7px;cursor:pointer;
  transition:border-color .13s,transform .16s var(--ease);
}
.p-btn-primary:hover{border-color:rgba(0,0,0,.2);transform:translateY(-1px)}
.p-btn-primary svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

/* Earnings hero card */
.pd-earnings{
  background:linear-gradient(135deg,#085041 0%,#0E6B52 100%);
  border-radius:20px;padding:28px 32px;
  margin-bottom:24px;position:relative;overflow:hidden;
}
.pd-earnings::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 50% 100% at 90% 50%,rgba(255,255,255,.07) 0%,transparent 60%);
  pointer-events:none;
}
.pd-earnings-grid{
  display:grid;grid-template-columns:2fr 1fr 1fr 1fr;
  gap:0;position:relative;z-index:1;
}
.pd-earn-main{
  border-right:1px solid rgba(255,255,255,.12);
  padding-right:32px;
}
.pd-earn-label{
  font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(255,255,255,.45);margin-bottom:8px;
}
.pd-earn-val{
  font-family:'Lora',Georgia,serif;
  font-size:40px;font-weight:600;letter-spacing:-.02em;color:#fff;line-height:1;margin-bottom:6px;
}
.pd-earn-sub{font-size:12px;color:rgba(255,255,255,.4)}
.pd-earn-stat{padding:0 24px;border-right:1px solid rgba(255,255,255,.12)}
.pd-earn-stat:last-child{border-right:none}
.pd-earn-stat-val{
  font-family:'Lora',Georgia,serif;
  font-size:22px;font-weight:600;color:#fff;letter-spacing:-.01em;
  margin-top:4px;margin-bottom:3px;
}
.pd-earn-stat-lbl{font-size:11px;color:rgba(255,255,255,.4);font-weight:500}

/* Content layout */
.pd-content{display:flex;gap:24px;align-items:flex-start}
.pd-main{flex:1;min-width:0}
.pd-aside{width:260px;flex-shrink:0;position:sticky;top:calc(var(--topbar-h) + 16px)}
.pd-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pd-section-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.pd-section-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:2px 8px;border-radius:5px;
  background:rgba(8,80,65,.08);color:var(--green);
  font-size:11px;font-weight:700;
}
.pd-section-badge-dot{width:5px;height:5px;border-radius:50%;background:#22C55E;flex-shrink:0}
.pd-section-link{font-size:12px;color:var(--t3);font-weight:500;cursor:pointer;transition:color .12s;border:none;background:none;padding:0}
.pd-section-link:hover{color:var(--t2)}

/* Request cards */
.pd-req-list{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.pd-req-card{
  background:#fff;border:1px solid var(--border);border-radius:14px;
  padding:18px 20px;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 3px 10px rgba(0,0,0,.04);
  transition:box-shadow .18s;
}
.pd-req-card:hover{box-shadow:0 2px 6px rgba(0,0,0,.05),0 8px 20px rgba(0,0,0,.07)}
.pd-req-top{display:flex;align-items:flex-start;gap:14px}
.pd-req-av{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  background:#EFEFEE;color:#525252;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;overflow:hidden;
}
.pd-req-av img{width:100%;height:100%;object-fit:cover}
.pd-req-body{flex:1;min-width:0}
.pd-req-header{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
.pd-req-name{font-size:14px;font-weight:700;color:var(--t1)}
.pd-req-svc-badge{
  font-size:10.5px;font-weight:600;color:var(--teal);
  padding:2px 7px;border-radius:4px;
  background:rgba(15,118,110,.07);border:1px solid rgba(15,118,110,.15);
}
.pd-req-meta{font-size:12px;color:var(--t3);margin-bottom:5px}
.pd-req-msg{
  font-size:13px;color:var(--t2);line-height:1.5;font-style:italic;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.pd-req-actions{

}
.spd-btn-accept:hover{background:#063D31}
.spd-btn-accept:disabled{opacity:.4;cursor:default}
.spd-btn-msg{

.spd-pipe-tile{

  .p-page{padding:20px 16px}

  .pd-earn-val{font-size:32px}
  .pd-pipe{grid-template-columns:1fr 1fr}
  .ch-header{padding:20px 16px 16px;flex-direction:column}
  .ch-body{padding:0 16px 40px;flex-direction:column}
  .pcard-grid{grid-template-columns:1fr;padding:0}
  .ch-discover{padding:0}
  .ch-upcoming{margin:0 16px 16px}
  .section-page{padding:20px 16px}
  .sch-wrap{padding:24px 16px 48px}
  .sch-grid{grid-template-columns:1fr}
  .spd-wrap{padding:24px 16px 48px}
  .spd-earn-strip{flex-direction:column}
  .spd-earn-item{border-right:none;border-bottom:1px solid var(--border)}
  .spd-earn-item:last-child{border-bottom:none}
  .spd-pipe{grid-template-columns:1fr 1fr}
  .spd-top-row{flex-direction:column}

.pvd-date-pill.teal{background:rgba(29,158,117,.12);color:#4AE3A0;border:1px solid rgba(29,158,117,.2)}
.pvd-bk-time{font-size:11px;color:rgba(255,255,255,.35);text-align:right;display:block}

/* Pipeline */
.pvd-pipe{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:32px}
.pvd-pipe-tile{
  background:#1A2E26;border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:18px 20px;
  transition:border-color .15s;
}
.pvd-pipe-tile:hover{border-color:rgba(255,255,255,.15)}
.pvd-pipe-label{
  font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  color:rgba(255,255,255,.35);margin-bottom:10px;
}
.pvd-pipe-val{
  font-size:30px;font-weight:900;letter-spacing:-.03em;color:#fff;line-height:1;
  margin-bottom:5px;
}
.pvd-pipe-val.green{color:#4AE3A0}
.pvd-pipe-note{font-size:11.5px;color:rgba(255,255,255,.3)}

/* Latest vouch */
.pvd-vouch-card{
  background:#F0F0FF;border-radius:14px;padding:18px 20px;
}
.pvd-vouch-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.pvd-vouch-av{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;overflow:hidden;
}
.pvd-vouch-name{font-size:13.5px;font-weight:700;color:#1A1A2E}
.pvd-vouch-badge{
  margin-left:auto;font-size:10.5px;font-weight:700;color:#5B4FCF;
  background:rgba(91,79,207,.12);border:1px solid rgba(91,79,207,.2);
  padding:2px 8px;border-radius:999px;
}
.pvd-vouch-text{
  font-size:13.5px;color:#3D3A5C;font-style:italic;line-height:1.65;
}

@media(max-width:900px){
  .pvd-stats{grid-template-columns:1fr 1fr}
  .pvd-stat{border-right:none;border-bottom:1px solid rgba(255,255,255,.07)}

  .pvd-content{padding:20px 16px 48px}
  .pvd-hero{padding:20px 16px 18px}
}

<body>

<!-- TOPBAR -->

</div>

<!-- BOOK NOW MODAL -->
<div class="modal-overlay hidden" id="bookModal">

</div>

<!-- REVIEW MODAL -->
<div class="modal-overlay hidden" id="reviewModal">

<!-- MESSAGE THREAD OVERLAY -->
<div class="modal-overlay hidden" id="msgOverlay" onclick="if(event.target===this)closeMsgOverlay()">

<script>
/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
let currentUser = null, userProfile = null, isProvider = false;
let _bookings = [], _vouches = [], _providers = [], _services = [];
const preview = new URLSearchParams(window.location.search).get('preview');

/* ── Icons ── */
const ICO = {

  info:    `<svg class="ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,

/* ── Avatar helpers ── */
const AV_COLORS = ['av-0','av-1','av-2','av-3','av-4'];
function avColor(name='') { let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))%5; return AV_COLORS[h]; }

/* ── User dropdown ── */
function toggleUserDropdown() {
  const dd = document.getElementById('userDropdown');
  if (!dd) return;
  const isOpen = dd.classList.toggle('open');
  /* update switch label */
  const lbl = document.getElementById('udSwitchLabel');
  if (lbl) lbl.textContent = isProvider ? 'Consumer' : 'Provider';
  /* close on outside click */
  if (isOpen) {
    setTimeout(() => document.addEventListener('click', closeOnOutside), 0);
  }
}
function closeUserDropdown() {
  const dd = document.getElementById('userDropdown');
  if (dd) dd.classList.remove('open');
  document.removeEventListener('click', closeOnOutside);
}
function closeOnOutside(e) {
  if (!e.target.closest('.user-chip-wrap')) closeUserDropdown();
}

/* ── Toast ── */
function toast(msg, type='success') {
  const t = document.createElement('div');
  const bg = type==='error'?'#EF4444':type==='info'?'#3B82F6':'#085041';
  t.style.cssText=`position:fixed;bottom:24px;right:24px;z-index:999;background:${bg};color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.15);animation:slideUp .25s ease`;
  t.textContent=msg;
  if(!document.querySelector('#toast-style')){const s=document.createElement('style');s.id='toast-style';s.textContent='@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}';document.head.appendChild(s);}
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3200);
}

/* ══════════════════════════════════════════════════════════
   SIDEBAR + ROUTER
══════════════════════════════════════════════════════════ */
const CONSUMER_SECTIONS = ['home','bookings','saved','messages','preferences'];
const PROVIDER_SECTIONS = ['dashboard','matches','jobs','reviews','earnings','settings'];

function buildSidebar(activeSection) {
  const providerLinks = [
    { ico:ICO.dash,    label:'Dashboard', section:'dashboard' },
    { ico:ICO.profile, label:'My profile', section:'profile' },
    { ico:ICO.matches, label:'Matches',   section:'matches' },
    { ico:ICO.msgs,    label:'Messages',  section:'messages' },
    { ico:ICO.jobs,    label:'Jobs',      section:'jobs' },
    { ico:ICO.reviews, label:'Reviews',   section:'reviews' },
    { ico:ICO.earn,    label:'Earnings',  section:'earnings' },
    { ico:ICO.settings,label:'Settings',  section:'settings' },
  ];
  const consumerLinks = [
    { ico:ICO.home,  label:'Home',           section:'home' },
    { ico:ICO.prefs, label:'My Preferences', section:'preferences' },
    { ico:ICO.saved, label:'Saved People',   section:'saved' },
    { ico:ICO.msgs,  label:'Messages',       section:'messages' },
    { ico:ICO.book,  label:'Bookings',       section:'bookings' },
  ];
  const links = isProvider ? providerLinks : consumerLinks;
  const activeClass = isProvider ? 'active-light' : 'active';

  document.getElementById('sidebar').innerHTML = `
    <a href="/" class="sidebar-logo" style="text-decoration:none;">
      <svg width="28" height="26" viewBox="0 0 120 110" fill="none">
        <path d="M10 90 C10 44 30 10 60 10" stroke="#085041" stroke-width="9" stroke-linecap="round"/>
        <path d="M60 10 C90 10 110 44 110 90" stroke="#EF9F27" stroke-width="9" stroke-linecap="round"/>
        <circle cx="60" cy="10" r="12" fill="#EF9F27"/>
        <circle cx="60" cy="10" r="5" fill="#0A0A0A"/>
      </svg>
      <span class="sidebar-logo-text">Sowo</span>
    </a>
    <nav class="sidebar-nav">
      ${links.map(l => {
        const isActive = l.section === activeSection;
        const onclick  = l.href
          ? `location.href='${l.href}'`
          : `navigateTo('${l.section}')`;
        return `<button class="sb-item${isActive?' '+activeClass:''}" onclick="${onclick}">${l.ico} ${l.label}</button>`;
      }).join('')}
    </nav>
    <div class="sidebar-footer">
      <div class="role-switch-wrap">
        <div class="rs-label">Viewing as</div>
        <div class="rs-current">
          <span class="rs-current-dot ${isProvider ? 'provider' : 'consumer'}"></span>
          ${isProvider ? 'Provider' : 'Consumer'}
        </div>
        <button class="rs-switch-btn" onclick="switchRole()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          Switch to ${isProvider ? 'Consumer' : 'Provider'}
        </button>
      </div>
      <div class="sb-divider"></div>
      <a href="/" class="sb-home-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to Sowo
      </a>
      <button class="sb-signout" onclick="Auth.signOut()">${ICO.logout} Sign out</button>
    </div>
  `;
}

function navigateTo(section) {
  buildSidebar(section);
  /* keep topbar dropdown label in sync */
  const lbl = document.getElementById('udSwitchLabel');
  if (lbl) lbl.textContent = isProvider ? 'Consumer' : 'Provider';
  if (isProvider) renderProviderSection(section);
  else             renderConsumerSection(section);
}

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
async function init() {
  if (preview) {
    isProvider  = preview === 'provider';
    userProfile = { full_name: isProvider ? 'Marcus O.' : 'Emily Johnson', is_provider: isProvider };
    currentUser = { id:'preview', user_metadata:{ full_name: userProfile.full_name } };
  } else {
    currentUser = await Auth.requireAuth();
    if (!currentUser) return;
    try {
      userProfile = await Profiles.get(currentUser.id);
      /* is_provider can be true, false, or null/undefined (not yet chosen) */
      if (userProfile?.is_provider === null || userProfile?.is_provider === undefined) {
        /* First login — no role chosen yet. Show role picker. */
        showRolePicker();
        return;
      }
      isProvider = userProfile.is_provider === true;
    } catch(e) {
      /* Profile row doesn't exist yet — treat as first login */
      userProfile = { full_name: currentUser.user_metadata?.full_name || currentUser.email?.split('@')[0] || 'User' };
      isProvider = false;
      showRolePicker();
      return;
    }
  }

  const name  = userProfile?.full_name || currentUser?.user_metadata?.full_name || currentUser?.email?.split('@')[0] || 'User';
  const email = currentUser?.email || '';
  document.getElementById('userName').textContent = name;
  document.getElementById('userAv').textContent   = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  if (userProfile?.avatar_url) document.getElementById('userAv').innerHTML = `<img src="${userProfile.avatar_url}" alt="">`;
  /* populate dropdown */
  const udName = document.getElementById('udName');
  const udEmail = document.getElementById('udEmail');
  if (udName)  udName.textContent  = name;
  if (udEmail) udEmail.textContent = email;

  /* load data once */
  await loadData();

  /* notification badge */
  const pending = _bookings.filter(b=>b.status==='pending').length;
  if (pending > 0) {
    const btn = document.getElementById('notifBtn');
    btn.insertAdjacentHTML('beforeend',`<span class="notif-count">${pending > 9 ? '9+' : pending}</span>`);
  }

  const defaultSection = isProvider ? 'dashboard' : 'home';
  buildSidebar(defaultSection);
  navigateTo(defaultSection);
}

async function loadData() {
  /* Always start with seed data so the dashboard is never empty —
     same pattern as index.html using SEED_R / SEED_L.
     Real Supabase data merges on top when available. */
  _bookings  = [...SEED_BOOKINGS];
  _vouches   = [...SEED_VOUCHES];
  _providers = [...SEED_PROVIDERS];

  if (!preview && currentUser?.id && currentUser.id !== 'preview') {
    try {
      const live = isProvider
        ? await Bookings.listForProvider(currentUser.id)
        : await Bookings.listForConsumer(currentUser.id);
      if (live?.length) _bookings = live;
    } catch(e) {}
    try {
      const { data } = await sb.from('vouches')
        .select('*,profiles(full_name,avatar_url)')
        .eq('provider_id', currentUser.id)
        .order('created_at', { ascending: false });
      if (data?.length) _vouches = data;
    } catch(e) {}
    try {
      const live = await Providers.list({ limit:6 });
      if (live?.length) _providers = live;
    } catch(e) {}
  }
}

function openBookModal(providerId) {
  _bookingProviderId = providerId;
  const p = _providers.find(x => x.id === providerId) || {};
  document.getElementById('bookProviderName').textContent = p.profiles?.full_name || 'Provider';
  const svcs = (p.services || []);
  document.getElementById('bookService').innerHTML = svcs.length
    ? svcs.map(s => `<option value="${s.id}">${s.name} — £${s.price}</option>`).join('')
    : '<option value="">No services listed</option>';
  document.getElementById('bookDate').value = '';
  document.getElementById('bookMessage').value = '';
  document.getElementById('bookModal').classList.remove('hidden');

function closeBookModal() { document.getElementById('bookModal').classList.add('hidden'); }
async function submitBooking() {
  const btn = document.getElementById('bookConfirmBtn');
  const serviceId = document.getElementById('bookService').value;
  const date      = document.getElementById('bookDate').value;
  const message   = document.getElementById('bookMessage').value.trim();
  if (!serviceId) { toast('Please select a service', 'error'); return; }
  if (!date)      { toast('Please pick a date', 'error'); return; }
  btn.disabled = true; btn.textContent = 'Sending…';
  try {
    if (!preview) {
      await Bookings.create({ provider_id: _bookingProviderId, service_id: serviceId, scheduled_date: date, message });
    }
    closeBookModal();
    toast('Booking request sent!');
    /* add to local list so Bookings tab reflects it immediately */
    const sel = document.getElementById('bookService');
    _bookings.unshift({ id:'new-'+Date.now(), status:'pending', created_at: new Date().toISOString(),
      profiles:{ full_name: document.getElementById('bookProviderName').textContent },
      services:{ name: sel.options[sel.selectedIndex]?.text?.split(' — ')[0] || 'Service' } });
  } catch(e) { toast('Could not send request — try again', 'error'); }
  btn.disabled = false; btn.textContent = 'Send request';
}

async function updateBookingStatus(bookingId, newStatus, btn) {
  btn.disabled = true;
  const label = newStatus==='confirmed' ? 'Accepting…' : newStatus==='completed' ? 'Completing…' : 'Declining…';
  btn.textContent = label;
  try {
    if (!preview) await Bookings.updateStatus(bookingId, newStatus);
    /* update local state */
    const bk = _bookings.find(b=>b.id===bookingId);
    if (bk) bk.status = newStatus;
    if (newStatus==='completed') {
      /* update the card in-place: swap badge + remove button */
      const card = document.getElementById(`pm-${bookingId}`);
      if (card) {
        const badge = card.querySelector('.bk-status');
        if (badge) { badge.className='bk-status completed'; badge.textContent='Completed'; }
        const actions = card.querySelector('.bk-actions');
        if (actions) actions.remove();
      }
      toast('Job marked complete — great work!');
    } else {
      /* remove card from the matches/requests grid */
      const card = document.getElementById(`pm-${bookingId}`);
      if (card) { card.style.transition='opacity .3s'; card.style.opacity='0'; setTimeout(()=>card.remove(),300); }
      toast(newStatus==='confirmed' ? 'Request accepted — check Jobs for details' : 'Request declined');
    }
    /* update notification badge count */
    const stillPending = _bookings.filter(b=>b.status==='pending').length;
    const badge = document.querySelector('.notif-count');
    if (badge) { badge.textContent = stillPending>0?(stillPending>9?'9+':stillPending):''; if(!stillPending) badge.remove(); }
  } catch(e) {
    toast('Could not update — try again', 'error');
    btn.disabled=false;
    btn.textContent = newStatus==='confirmed'?'Accept':newStatus==='completed'?'Mark complete':'Decline';
  }
}

/* ══════════════════════════════════════════════════════════

══════════════════════════════════════════════════════════ */
function buildSparkline(vouches) {
  const pts  = vouches.length ? vouches.slice(-8) : [{rating:4.5},{rating:4.7},{rating:4.8},{rating:4.9},{rating:5.0}];
  const xs   = pts.map((_,i)=>(i/Math.max(pts.length-1,1))*190+5);
  const ys   = pts.map(v=>48-((v.rating/5)*38));
  const path = xs.map((x,i)=>`${i===0?'M':'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const area = `${path} L${xs[xs.length-1].toFixed(1)},52 L5,52 Z`;
  return `<svg class="sparkline" viewBox="0 0 200 52" preserveAspectRatio="none">
    <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1D9E75" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#sg)"/>
    <path d="${path}" stroke="#1D9E75" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${xs[xs.length-1].toFixed(1)}" cy="${ys[ys.length-1].toFixed(1)}" r="3.5" fill="#1D9E75"/>
  </svg>`;
}

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </div>
        <h3>I offer a service</h3>
        <p>List your skills, receive job requests from clients in your area, and build your reputation.</p>
      </div>
    </div>
    <button class="role-pick-btn" id="rolePickBtn" onclick="confirmRole()">Continue →</button>
  `;
  document.body.appendChild(screen);
}

function pickRole(role) {
  _pickedRole = role;
  document.getElementById('roleCardConsumer').classList.toggle('selected', role === 'consumer');
  document.getElementById('roleCardProvider').classList.toggle('selected', role === 'provider');
  document.getElementById('rolePickBtn').classList.add('ready');
}

async function confirmRole() {
  if (!_pickedRole) return;
  const btn = document.getElementById('rolePickBtn');
  btn.textContent = 'Setting up your account…';
  btn.style.pointerEvents = 'none';

  isProvider = _pickedRole === 'provider';
  await saveRole();

  /* remove picker and boot the real dashboard */
  const screen = document.getElementById('rolePickScreen');
  if (screen) screen.remove();

  await loadData();
  const defaultSection = isProvider ? 'dashboard' : 'home';
  buildSidebar(defaultSection);
  navigateTo(defaultSection);
}

async function switchRole() {
  isProvider = !isProvider;
  await saveRole();
  toast(`Switched to ${isProvider ? 'Provider' : 'Consumer'} view`);
  /* reload data for the new role then re-render */
  await loadData();
  const defaultSection = isProvider ? 'dashboard' : 'home';
  buildSidebar(defaultSection);
  navigateTo(defaultSection);
}

async function saveRole() {
  try {
    if (currentUser && currentUser.id !== 'preview') {
      await Profiles.upsert(currentUser.id, {
        is_provider: isProvider,
        full_name: userProfile?.full_name || currentUser.user_metadata?.full_name || currentUser.email?.split('@')[0],
      });
    }
  } catch(e) {
    console.warn('Could not save role:', e);
  }
}

let _activeMsgThread = null;

function openMsg(personId, personName) {
  _activeMsgThread = personId;

  const ini = personName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  av.textContent = ini;

}

function closeMsgOverlay() {
  document.getElementById('msgOverlay').classList.add('hidden');
  _activeMsgThread = null;
}

function getMsgThread(threadId) {
  const all = JSON.parse(localStorage.getItem('sowo_msgs') || '{}');
  return all[threadId] || [];
}

function saveMsgThread(threadId, msgs) {
  const all = JSON.parse(localStorage.getItem('sowo_msgs') || '{}');
  all[threadId] = msgs;
  localStorage.setItem('sowo_msgs', JSON.stringify(all));
}

function renderMsgThread(threadId) {
  const msgs = getMsgThread(threadId);
  const myName = userProfile?.full_name || currentUser?.email?.split('@')[0] || 'You';
  const container = document.getElementById('msgThread');
  if (!msgs.length) {
    container.innerHTML = `<div style="text-align:center;color:var(--t3);font-size:13px;margin:auto;padding:20px 0">No messages yet. Say hello! 👋</div>`;
    return;
  }
  container.innerHTML = msgs.map(m => {
    const isMe = m.from === 'me';
    return `<div style="display:flex;flex-direction:column;align-items:${isMe?'flex-end':'flex-start'};gap:2px">
      <div style="max-width:78%;padding:9px 13px;border-radius:${isMe?'14px 14px 4px 14px':'14px 14px 14px 4px'};background:${isMe?'var(--green)':'var(--border)'};color:${isMe?'var(--mint)':'var(--t1)'};font-size:13.5px;line-height:1.45">${m.text}</div>
      <div style="font-size:11px;color:var(--t3)">${m.time}</div>
    </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !_activeMsgThread) return;
  const msgs = getMsgThread(_activeMsgThread);
  msgs.push({ from:'me', text, time: new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) });
  saveMsgThread(_activeMsgThread, msgs);
  input.value = '';
  renderMsgThread(_activeMsgThread);
  // Add a notification for demo
  const notifs = JSON.parse(localStorage.getItem('sowo_notifs') || '[]');
  notifs.unshift({ id:'n'+Date.now(), icon:'💬', text:`Message sent to ${document.getElementById('msgName').textContent}`, time:'just now', read:false });
  localStorage.setItem('sowo_notifs', JSON.stringify(notifs.slice(0,10)));
}

function setReviewStar(val) {
  _reviewRating = val;

async function submitReview() {
  if (!_reviewRating) { toast('Please select a star rating', 'error'); return; }
  const text = document.getElementById('reviewText').value.trim();
  const btn = document.getElementById('reviewSubmitBtn');
  btn.disabled = true; btn.textContent = 'Submitting…';
  try {
    const review = { id:'rev-'+Date.now(), rating:_reviewRating, text, created_at: new Date().toISOString(), profiles:{ full_name: currentUser?.user_metadata?.full_name || 'You' } };
    _vouches.unshift(review);
    // persist locally
    const stored = JSON.parse(localStorage.getItem('sowo_reviews') || '[]');
    stored.unshift(review);
    localStorage.setItem('sowo_reviews', JSON.stringify(stored.slice(0,20)));
    if (!preview) {
      try { await Vouches?.create?.({ booking_id: _reviewBookingId, rating: _reviewRating, text }); } catch(e){}
    }
    closeReviewModal();
    toast('Review submitted — thank you! ⭐');
    // refresh bookings view
    renderConsumerBookings();
  } catch(e) { toast('Could not submit — try again', 'error'); }
  btn.disabled = false; btn.textContent = 'Submit review';
}

          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">Email</label>
            <input value="${email}" type="email" disabled style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:13px;background:var(--bg);color:var(--t3)">
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">Location</label>
            <input id="set-loc" value="${loc}" type="text" placeholder="e.g. Manchester" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:13px;outline:none">
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">Category</label>
            <select id="set-cat" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:13px;outline:none">
              ${['Barber','Cleaning','Electrical','Plumbing','Tutoring','Beauty','Moving','Childcare'].map(c=>`<option${c===cat?' selected':''}>${c}</option>`).join('')}
            </select>
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">Bio</label>
            <textarea id="set-bio" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:13px;outline:none;min-height:80px;resize:vertical">${bio}</textarea>
          </div>
          <button onclick="saveSettings()" style="height:40px;background:var(--green);color:var(--mint);border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer">Save changes</button>
        </div>
      </div>

      <div style="background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:24px;margin-bottom:18px">
        <div style="font-size:13px;font-weight:700;color:var(--t1);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)">Account</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button onclick="switchRole()" style="display:flex;align-items:center;gap:10px;width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--t1)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            Switch to Consumer view
          </button>
          <button onclick="Auth.signOut()" style="display:flex;align-items:center;gap:10px;width:100%;padding:11px 14px;border:1.5px solid #FECACA;border-radius:10px;background:#FFF5F5;font-size:13px;font-weight:600;cursor:pointer;color:#DC2626">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign out
          </button>
        </div>
      </div>
    </div>`;
}

async function saveSettings() {
  const updates = {
    full_name: document.getElementById('set-name').value.trim(),
    location:  document.getElementById('set-loc').value.trim(),
    category:  document.getElementById('set-cat').value,
    bio:       document.getElementById('set-bio').value.trim(),
  };
  if (preview) { Object.assign(userProfile, updates); toast('Settings saved'); return; }
  try {
    await Profiles.upsert(currentUser.id, updates);
    Object.assign(userProfile, updates);
    toast('Settings saved');
  } catch(e) { toast('Could not save — try again', 'error'); }
}
</script>
</body>
</html>
