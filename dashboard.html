<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Sowo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --green:#085041;--teal:#1D9E75;--mint:#9FE1CB;--mint-bg:#E1F5EE;
  --amber:#EF9F27;--amber-bg:#FEF3E0;--amber-dk:#8B5E0A;
  --black:#0A0A0A;--white:#fff;--t1:#0A0A0A;--t2:#555555;--t3:#999999;
  --border:#EBEBF0;--surf:#F5F5F5;--card:#fff;
  /* dashboard accent — teal for active/CTAs */
  --accent:#1D9E75;--accent-light:#E1F5EE;--accent-dark:#085041;
  --ease:cubic-bezier(.16,1,.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:'Inter',-apple-system,sans-serif;background:#F6F6F6;color:var(--t1);min-height:100vh;display:flex}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── SIDEBAR ── */
.sidebar{
  width:220px;flex-shrink:0;background:#fff;
  border-right:1px solid #EBEBF0;
  display:flex;flex-direction:column;
  min-height:100vh;position:fixed;top:0;left:0;bottom:0;z-index:50;
}
.sidebar-logo{
  display:flex;align-items:center;gap:8px;
  padding:22px 20px 18px;border-bottom:1px solid #F0F0F5;
}
.sidebar-logo svg{width:32px;height:28px;flex-shrink:0}
.sidebar-logo-text{font-family:Georgia,serif;font-size:20px;font-weight:700;color:var(--black)}
.sidebar-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;
  font-size:13px;font-weight:600;color:#6B7280;
  cursor:pointer;transition:all .15s;width:100%;text-align:left;
}
.sb-item:hover{background:var(--surf);color:var(--t1)}
/* consumer active — amber */
.sb-item.active{background:var(--amber);color:#fff}
.sb-item.active svg{color:#fff}
/* provider active — green light */
.sb-item.active-light{background:var(--mint-bg);color:var(--green)}
.sb-item.active-light svg{color:var(--green)}
.sb-item svg{width:16px;height:16px;flex-shrink:0;color:#9CA3AF;transition:color .15s}
.sb-item:hover svg{color:var(--t1)}
.sb-divider{height:1px;background:#F0F0F5;margin:8px 0}
.sb-signout{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  font-size:13px;font-weight:600;color:#9CA3AF;cursor:pointer;
  border-radius:10px;transition:all .15s;width:100%;margin:0 10px 16px;
}
.sb-signout:hover{color:#EF4444;background:#FEF2F2}
.sb-signout svg{width:16px;height:16px;flex-shrink:0}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:220px;right:0;z-index:40;
  height:60px;background:transparent;
  padding:0 28px;display:flex;align-items:center;justify-content:flex-end;gap:12px;
}
.notif-btn{
  width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.85);
  border:1px solid rgba(255,255,255,.5);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  backdrop-filter:blur(4px);position:relative;
}
.notif-btn svg{width:17px;height:17px;color:#fff}
.notif-dot{position:absolute;top:7px;right:7px;width:8px;height:8px;border-radius:50%;background:#EF4444;border:2px solid #fff}
.user-chip{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.9);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.6);
  border-radius:999px;padding:4px 10px 4px 4px;cursor:pointer;
}
.user-av{
  width:30px;height:30px;border-radius:50%;
  background:var(--green);display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:var(--mint);flex-shrink:0;overflow:hidden;
}
.user-av img{width:100%;height:100%;object-fit:cover}
.user-chip-name{font-size:13px;font-weight:600;color:var(--t1)}
.chip-caret{width:14px;height:14px;color:var(--t2)}

/* ── PAGE LAYOUT ── */
.page{margin-left:220px;flex:1;min-height:100vh;display:flex;flex-direction:column;min-width:0}

/* ════════════════════════════════════════
   CONSUMER DASHBOARD
════════════════════════════════════════ */

/* Hero banner */
.c-hero{
  background:linear-gradient(135deg,#085041 0%,#0D6B55 45%,#1D9E75 100%);
  padding:70px 28px 28px;position:relative;overflow:hidden;
}
.c-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 75% 40%,rgba(239,159,39,.18) 0%,transparent 65%);
}
.c-hero-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;position:relative;z-index:1}
.c-hero-left h1{
  font-size:28px;font-weight:900;color:#fff;line-height:1.2;
  letter-spacing:-.5px;margin-bottom:8px;
}
.c-hero-left p{font-size:14px;color:rgba(255,255,255,.65);margin-bottom:16px}
.c-chips{display:flex;flex-wrap:wrap;gap:8px}
.c-chip{
  height:28px;padding:0 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);
  font-size:12px;font-weight:600;color:#fff;display:inline-flex;align-items:center;gap:4px;
}
.c-chip b{color:rgba(255,255,255,.7);font-weight:400}

/* Trust profile widget */
.trust-widget{
  background:#fff;border-radius:16px;padding:18px 20px;
  min-width:220px;flex-shrink:0;box-shadow:0 8px 32px rgba(0,0,0,.12);
}
.tw-title{font-size:14px;font-weight:800;color:var(--t1);margin-bottom:14px}
.tw-row{margin-bottom:10px}
.tw-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.tw-val{font-size:13px;font-weight:600;color:var(--t1)}
.tw-edit{
  width:100%;height:34px;border-radius:8px;border:1px solid var(--border);
  font-size:12px;font-weight:600;color:var(--t1);background:#fff;
  cursor:pointer;margin-top:12px;transition:all .15s;
}
.tw-edit:hover{border-color:var(--teal);color:var(--teal)}

/* Consumer body */
.c-body{padding:24px 28px 40px}
.c-section-title{font-size:15px;font-weight:800;color:var(--t1);margin-bottom:16px}

/* Match cards — 3 col grid */
.match-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:32px}
.match-card{
  background:#fff;border:1px solid #EBEBF0;border-radius:16px;
  padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);
  transition:box-shadow .2s,transform .2s;
}
.match-card:hover{box-shadow:0 8px 24px rgba(76,59,207,.12);transform:translateY(-1px)}
.mc-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.mc-av{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  object-fit:cover;background:var(--green);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;
}
.mc-av.av-0,.pm-av.av-0{background:#8B5CF6;color:#fff}
.mc-av.av-1,.pm-av.av-1{background:#14B8A6;color:#fff}
.mc-av.av-2,.pm-av.av-2{background:#F43F5E;color:#fff}
.mc-av.av-3,.pm-av.av-3{background:#F97316;color:#fff}
.mc-av.av-4,.pm-av.av-4{background:#0EA5E9;color:#fff}
.mc-name{font-size:14px;font-weight:700;color:var(--t1);line-height:1.2}
.mc-role{font-size:11px;color:var(--t3);margin-top:1px}

/* Trust score bar */
.ts-row{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.ts-label{font-size:11px;font-weight:700;color:var(--t2);white-space:nowrap}
.ts-val{font-size:11px;font-weight:800;color:var(--teal)}
.ts-bar{flex:1;height:4px;background:#E8E8E8;border-radius:999px;overflow:hidden}
.ts-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--teal),#4DD9A8)}
.ts-badge{font-size:10px;font-weight:700;color:var(--teal);white-space:nowrap}

/* Checks */
.mc-checks{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.mc-check{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2);font-weight:500}
.mc-check .ck{width:13px;height:13px;color:var(--teal);flex-shrink:0}
.mc-check .ck-star{color:var(--amber)}

/* Explanation */
.mc-explain{
  background:#EFF6FF;border-radius:10px;
  padding:9px 10px;margin-bottom:10px;
  display:flex;gap:7px;align-items:flex-start;
}
.mc-explain svg{width:13px;height:13px;color:#60A5FA;flex-shrink:0;margin-top:1px}
.mc-explain p{font-size:10px;color:var(--t2);line-height:1.5}

.mc-respond{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);margin-bottom:12px}
.mc-respond svg{width:12px;height:12px}

.mc-actions{display:flex;gap:7px}
.btn-outline-sm{
  height:32px;padding:0 12px;border-radius:8px;
  border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--t1);
  background:#fff;cursor:pointer;transition:border-color .15s;
}
.btn-outline-sm:hover{border-color:var(--teal)}
.btn-purple-sm{
  height:32px;padding:0 12px;border-radius:8px;font-size:12px;font-weight:600;
  color:var(--mint);background:var(--green);cursor:pointer;transition:background .15s;
}
.btn-purple-sm:hover{background:#063D31}

/* People like you chose */
.plc-pills{display:flex;flex-wrap:wrap;gap:8px}
.plc-pill{
  display:inline-flex;align-items:center;gap:8px;padding:10px 16px;
  border-radius:12px;border:1px solid var(--border);background:#fff;
  font-size:12px;font-weight:600;color:var(--t2);
  cursor:pointer;transition:all .15s;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.plc-pill:hover{border-color:var(--teal);color:var(--teal)}
.plc-ico{font-size:16px}

/* ════════════════════════════════════════
   PROVIDER DASHBOARD
════════════════════════════════════════ */
.p-page{padding:28px;padding-top:72px;display:flex;gap:22px;align-items:flex-start}
.p-main{flex:1;min-width:0}
.p-aside{width:255px;flex-shrink:0}

.p-header{margin-bottom:22px}
.p-header h1{font-size:24px;font-weight:900;letter-spacing:-.5px;color:var(--t1)}
.p-header p{font-size:13px;color:var(--t3);margin-top:3px}

/* Stat cards */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
.stat-card{
  background:#fff;border:1px solid #EBEBF0;border-radius:14px;
  padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,.03);
}
.stat-label{font-size:11px;font-weight:600;color:var(--t3);margin-bottom:8px}
.stat-val{font-size:28px;font-weight:900;letter-spacing:-.5px;color:var(--t1);line-height:1}
.stat-sub{font-size:11px;color:var(--t3);margin-top:4px}
.stat-star{color:var(--amber);font-size:15px;margin-right:3px}
.stat-excel{font-size:11px;font-weight:700;color:var(--teal)}

/* Section heading */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-head h2{font-size:16px;font-weight:800;color:var(--t1)}
.sec-head a{font-size:12px;color:var(--teal);font-weight:600}
.sec-head a:hover{text-decoration:underline}

/* Provider match cards — 3 col */
.pm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:26px}
.pm-card{
  background:#fff;border:1px solid #EBEBF0;border-radius:16px;
  padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);
  transition:box-shadow .2s,transform .2s;
}
.pm-card:hover{box-shadow:0 8px 24px rgba(76,59,207,.1);transform:translateY(-1px)}
.pm-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.pm-av{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  background:var(--purple-light);color:var(--purple);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
  overflow:hidden;
}
.pm-av img{width:100%;height:100%;object-fit:cover}
.pm-name{font-size:13px;font-weight:800;color:var(--t1)}
.pm-job{font-size:11px;color:var(--t3);margin-top:1px}
.pm-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.pm-tag{
  padding:3px 8px;border-radius:999px;border:1px solid var(--border);
  font-size:10px;font-weight:600;color:var(--t2);
}
.pm-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;color:#059669;margin-bottom:9px;
}
.pm-badge-dot{
  width:16px;height:16px;border-radius:50%;background:#10B981;
  display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
}
.pm-badge-dot svg{width:9px;height:9px;color:#fff}
.pm-explain{
  background:#EFF6FF;border-radius:10px;
  padding:8px 10px;margin-bottom:10px;display:flex;gap:7px;align-items:flex-start;
}
.pm-explain svg{width:12px;height:12px;color:#60A5FA;flex-shrink:0;margin-top:1px}
.pm-explain p{font-size:10px;color:var(--t2);line-height:1.5}
.pm-actions{display:flex;gap:7px}
.btn-ghost{
  height:30px;padding:0 11px;border-radius:7px;border:1px solid var(--border);
  font-size:11px;font-weight:600;color:var(--t1);background:#fff;cursor:pointer;transition:border-color .15s;
}
.btn-ghost:hover{border-color:var(--teal)}
.btn-green-sm{
  height:30px;padding:0 11px;border-radius:7px;font-size:11px;font-weight:600;
  color:var(--mint);background:var(--green);cursor:pointer;transition:background .15s;
}
.btn-green-sm:hover{background:#063D31}

/* Pipeline */
.pipe-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.pipe-tile{
  background:#fff;border:1px solid #EBEBF0;border-radius:12px;
  padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.03);
}
.pipe-label{font-size:11px;font-weight:600;color:var(--t3);margin-bottom:6px}
.pipe-val{font-size:22px;font-weight:900;letter-spacing:-.5px;color:var(--t1)}

/* Trust insights */
.ti-card{background:#fff;border:1px solid #EBEBF0;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.ti-title{font-size:14px;font-weight:800;color:var(--t1);margin-bottom:16px}
.ti-row{padding:0 0 12px}
.ti-row-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.ti-name{font-size:11px;font-weight:500;color:var(--t2)}
.ti-val{font-size:12px;font-weight:700;color:var(--t1)}
.ti-bar{height:6px;background:#E1F5EE;border-radius:999px;overflow:hidden;margin-bottom:0}
.ti-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green),var(--teal))}
.ti-chart-wrap{margin:16px 0 12px}
.ti-chart-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.sparkline{width:100%;height:52px}
.ti-desc{font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:14px}
.ti-checklist{display:flex;flex-direction:column;gap:7px}
.ti-check-item{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--t2)}
.ti-check-item svg{width:15px;height:15px;color:var(--purple);flex-shrink:0}

/* Empty */
.empty-box{
  background:#fff;border:1px dashed var(--border);border-radius:14px;
  padding:40px 24px;text-align:center;
}
.empty-ico{font-size:32px;margin-bottom:10px}
.empty-box h3{font-size:15px;font-weight:700;margin-bottom:5px}
.empty-box p{font-size:13px;color:var(--t3);margin-bottom:16px}

/* ── SECTION PAGES (non-hero views) ── */
.section-page{padding:28px;padding-top:80px}
.section-page h1{font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:4px}
.section-page .sub{font-size:13px;color:var(--t3);margin-bottom:24px}

/* Booking list cards */
.bk-list{display:flex;flex-direction:column;gap:12px}
.bk-card{
  background:#fff;border:1px solid var(--border);border-radius:14px;
  padding:16px 20px;display:flex;align-items:center;gap:16px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.bk-av{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;
}
.bk-info{flex:1;min-width:0}
.bk-name{font-size:14px;font-weight:700;color:var(--t1)}
.bk-service{font-size:12px;color:var(--t2);margin-top:1px}
.bk-date{font-size:11px;color:var(--t3);margin-top:3px}
.bk-status{
  padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;
  white-space:nowrap;flex-shrink:0;
}
.bk-status.pending{background:#FEF3E0;color:#8B5E0A}
.bk-status.confirmed{background:#E1F5EE;color:#085041}
.bk-status.completed{background:#F0F0F0;color:#555}
.bk-status.cancelled{background:#FEE2E2;color:#B91C1C}
.bk-status.in_progress{background:#EEF2FF;color:#3730A3}
.bk-actions{display:flex;gap:8px;flex-shrink:0}

/* Vouch/review cards */
.vouch-list{display:flex;flex-direction:column;gap:12px}
.vouch-card{
  background:#fff;border:1px solid var(--border);border-radius:14px;
  padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.vouch-head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.vouch-name{font-size:13px;font-weight:700;color:var(--t1)}
.vouch-date{font-size:11px;color:var(--t3);margin-top:1px}
.vouch-stars{color:var(--amber);font-size:14px;letter-spacing:1px}
.vouch-text{font-size:13px;color:var(--t2);line-height:1.6;font-style:italic}

/* Modal overlay */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(2px);
}
.modal-overlay.hidden{display:none}
.modal{
  background:#fff;border-radius:20px;padding:28px;width:100%;max-width:460px;
  box-shadow:0 24px 64px rgba(0,0,0,.18);
}
.modal h2{font-size:18px;font-weight:800;margin-bottom:4px}
.modal .modal-sub{font-size:13px;color:var(--t2);margin-bottom:20px}
.modal label{display:block;font-size:12px;font-weight:700;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.modal input,.modal textarea,.modal select{
  width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;
  font-family:inherit;font-size:13px;color:var(--t1);background:#fff;
  outline:none;transition:border-color .15s;margin-bottom:14px;
}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--teal)}
.modal textarea{resize:vertical;min-height:80px}
.modal-actions{display:flex;gap:10px;margin-top:6px}
.modal-actions .btn-cancel{
  flex:1;height:40px;border:1px solid var(--border);border-radius:10px;
  font-size:13px;font-weight:600;color:var(--t2);background:#fff;cursor:pointer;
}
.modal-actions .btn-confirm{
  flex:2;height:40px;border-radius:10px;
  font-size:13px;font-weight:700;color:var(--mint);background:var(--green);cursor:pointer;
  border:none;transition:background .15s;
}
.modal-actions .btn-confirm:hover{background:#063D31}
.modal-actions .btn-confirm:disabled{opacity:.6;cursor:default}

/* Notif badge */
.notif-count{
  position:absolute;top:-3px;right:-3px;
  min-width:16px;height:16px;border-radius:999px;
  background:#EF4444;border:2px solid #fff;
  font-size:9px;font-weight:800;color:#fff;
  display:flex;align-items:center;justify-content:center;padding:0 3px;
}
.notif-btn{position:relative}

/* Accept / Decline inline */
.pm-ad{display:flex;gap:7px;margin-top:8px}
.btn-accept{
  flex:1;height:30px;border-radius:7px;font-size:11px;font-weight:700;
  color:var(--mint);background:var(--green);border:none;cursor:pointer;transition:background .15s;
}
.btn-accept:hover{background:#063D31}
.btn-decline{

<script>
/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
let currentUser = null, userProfile = null, isProvider = false;
let _bookings = [], _vouches = [], _providers = [], _services = [];
const preview = new URLSearchParams(window.location.search).get('preview');

/* ── Icons ── */
const ICO = {
  dash:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,

  saved:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`,

  check:   `<svg class="ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
  info:    `<svg class="ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
  clock:   `<svg class="ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  checkfill:`<svg class="ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
};

/* ── Avatar helpers ── */
const AV_COLORS = ['av-0','av-1','av-2','av-3','av-4'];
function avColor(name='') { let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))%5; return AV_COLORS[h]; }

/* ── Toast ── */
function toast(msg, type='success') {
  const t = document.createElement('div');
  const bg = type==='error'?'#EF4444':type==='info'?'#3B82F6':'#085041';
  t.style.cssText=`position:fixed;bottom:24px;right:24px;z-index:999;background:${bg};color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.15);animation:slideUp .25s ease`;
  t.textContent=msg;
  if(!document.querySelector('#toast-style')){const s=document.createElement('style');s.id='toast-style';s.textContent='@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}';document.head.appendChild(s);}
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3200);
}

/* ══════════════════════════════════════════════════════════
   SIDEBAR + ROUTER
══════════════════════════════════════════════════════════ */
const CONSUMER_SECTIONS = ['home','bookings','saved','messages','preferences'];
const PROVIDER_SECTIONS = ['dashboard','matches','jobs','reviews','earnings','settings'];

function buildSidebar(activeSection) {
  const providerLinks = [
    { ico:ICO.dash,    label:'Dashboard', section:'dashboard' },
    { ico:ICO.profile, label:'My profile',href:'/become-provider' },
    { ico:ICO.matches, label:'Matches',   section:'matches' },
    { ico:ICO.msgs,    label:'Messages',  section:'messages' },
    { ico:ICO.jobs,    label:'Jobs',      section:'jobs' },
    { ico:ICO.reviews, label:'Reviews',   section:'reviews' },
    { ico:ICO.earn,    label:'Earnings',  section:'earnings' },
    { ico:ICO.settings,label:'Settings',  section:'settings' },
  ];
  const consumerLinks = [
    { ico:ICO.home,  label:'Home',           section:'home' },
    { ico:ICO.prefs, label:'My Preferences', section:'preferences' },
    { ico:ICO.saved, label:'Saved People',   section:'saved' },
    { ico:ICO.msgs,  label:'Messages',       section:'messages' },
    { ico:ICO.book,  label:'Bookings',       section:'bookings' },
  ];
  const links = isProvider ? providerLinks : consumerLinks;
  const activeClass = isProvider ? 'active-light' : 'active';

  document.getElementById('sidebar').innerHTML = `
    <div class="sidebar-logo">
      <svg width="28" height="26" viewBox="0 0 120 110" fill="none">
        <path d="M10 90 C10 44 30 10 60 10" stroke="#085041" stroke-width="9" stroke-linecap="round"/>
        <path d="M60 10 C90 10 110 44 110 90" stroke="#EF9F27" stroke-width="9" stroke-linecap="round"/>
        <circle cx="60" cy="10" r="12" fill="#EF9F27"/>
        <circle cx="60" cy="10" r="5" fill="#0A0A0A"/>
      </svg>
      <span class="sidebar-logo-text">Sowo</span>
    </div>
    <nav class="sidebar-nav">
      ${links.map(l => {
        const isActive = l.section === activeSection;
        const onclick  = l.href
          ? `location.href='${l.href}'`
          : `navigateTo('${l.section}')`;
        return `<button class="sb-item${isActive?' '+activeClass:''}" onclick="${onclick}">${l.ico} ${l.label}</button>`;
      }).join('')}
      <div class="sb-divider"></div>
      <button class="sb-signout" onclick="Auth.signOut()">${ICO.logout} Sign out</button>
    </nav>
  `;
}

function navigateTo(section) {
  buildSidebar(section);
  if (isProvider) renderProviderSection(section);
  else             renderConsumerSection(section);
}

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
async function init() {
  if (preview) {
    isProvider  = preview === 'provider';
    userProfile = { full_name: isProvider ? 'Marcus O.' : 'Emily Johnson', is_provider: isProvider };
    currentUser = { id:'preview', user_metadata:{ full_name: userProfile.full_name } };
  } else {
    currentUser = await Auth.requireAuth();
    if (!currentUser) return;
    try { userProfile = await Profiles.get(currentUser.id); isProvider = userProfile?.is_provider || false; }
    catch(e) { userProfile = { full_name: currentUser.email?.split('@')[0] || 'User' }; }
  }

  const name = userProfile?.full_name || 'User';
  document.getElementById('userName').textContent = name;
  document.getElementById('userAv').textContent   = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  if (userProfile?.avatar_url) document.getElementById('userAv').innerHTML = `<img src="${userProfile.avatar_url}" alt="">`;

  /* load data once */
  await loadData();

  /* notification badge */
  const pending = _bookings.filter(b=>b.status==='pending').length;
  if (pending > 0) {
    const btn = document.getElementById('notifBtn');
    btn.insertAdjacentHTML('beforeend',`<span class="notif-count">${pending > 9 ? '9+' : pending}</span>`);
  }

  const defaultSection = isProvider ? 'dashboard' : 'home';
  buildSidebar(defaultSection);
  navigateTo(defaultSection);
}

async function loadData() {
  if (preview) {
    _bookings = [
      { id:'b1', status:'pending',    consumer_id:'c1', provider_id:'p1', created_at:'2025-04-10', profiles:{ full_name:'Emily S.',  avatar_url:null }, services:{ name:'Fix lighting in living room',  price:80 } },
      { id:'b2', status:'pending',    consumer_id:'c2', provider_id:'p1', created_at:'2025-04-11', profiles:{ full_name:'Sunes G.',  avatar_url:null }, services:{ name:'Deep clean apartment',         price:60 } },
      { id:'b3', status:'pending',    consumer_id:'c3', provider_id:'p1', created_at:'2025-04-12', profiles:{ full_name:'Aisha K.',  avatar_url:null }, services:{ name:'Fix lighting in living room',  price:80 } },
      { id:'b4', status:'confirmed',  consumer_id:'c4', provider_id:'p1', created_at:'2025-04-08', profiles:{ full_name:'James T.',  avatar_url:null }, services:{ name:'Kitchen wiring',               price:120 } },
      { id:'b5', status:'completed',  consumer_id:'c5', provider_id:'p1', created_at:'2025-03-28', profiles:{ full_name:'Grace M.',  avatar_url:null }, services:{ name:'Garden lighting',              price:95 } },
      { id:'b6', status:'completed',  consumer_id:'c6', provider_id:'p1', created_at:'2025-03-20', profiles:{ full_name:'Daniel R.', avatar_url:null }, services:{ name:'Full rewire inspection',       price:150 } },
    ];
    _vouches = [
      { id:'v1', rating:5,   text:'Incredibly professional and on time. Would book again!',      profiles:{ full_name:'Grace M.' },  created_at:'2025-03-28' },
      { id:'v2', rating:5,   text:'Explained everything clearly — felt totally at ease.',         profiles:{ full_name:'Daniel R.' }, created_at:'2025-03-20' },
      { id:'v3', rating:4,   text:'Great work, minor delay but communicated well.',               profiles:{ full_name:'Sarah L.' },  created_at:'2025-03-10' },
      { id:'v4', rating:5,   text:'Highly recommend. Trusted with my home straight away.',        profiles:{ full_name:'Tolu A.' },   created_at:'2025-02-25' },
    ];
    _providers = [
      { id:'p1', category:'Electrician', rating:4.9, bio:'your communication style and extensive experience with residential electrical work.', profiles:{ full_name:'Emily S.',  avatar_url:null }, services:[{ id:'s1', name:'Electrical inspection', price:80 },{ id:'s2', name:'Rewire room', price:120 }] },
      { id:'p2', category:'Cleaner',     rating:4.9, bio:'your preference for friendly communication and reliable service standards.',         profiles:{ full_name:'Sunee G.',  avatar_url:null }, services:[{ id:'s3', name:'Standard clean', price:55 },{ id:'s4', name:'Deep clean', price:90 }] },
      { id:'p3', category:'Plumber',     rating:4.8, bio:'the community vouches and shared background with your diaspora group.',              profiles:{ full_name:'Aatilp J.', avatar_url:null }, services:[{ id:'s5', name:'Leak repair', price:70 },{ id:'s6', name:'Pipe install', price:110 }] },
    ];
  } else {
    try { _bookings = isProvider ? await Bookings.listForProvider(currentUser.id) : await Bookings.listForConsumer(currentUser.id); } catch(e){}
    try {
      const { data } = await sb.from('vouches').select('*,profiles(full_name,avatar_url)').eq('provider_id', isProvider ? currentUser.id : '').order('created_at',{ascending:false});
      _vouches = data || [];
    } catch(e){}
    try { _providers = await Providers.list({ limit:6 }); } catch(e){}
  }
}

          <div class="empty-box"><div class="empty-ico">🚧</div><h3>Under construction</h3><p>This feature is on the way.</p></div>

  }
}

      </div>

}

async function savePreferences() {
  if (preview) { toast('Preferences saved'); return; }
  try {
    await Profiles.upsert(currentUser.id, {
      preferred_language: document.getElementById('pref-lang').value,
      communication_style: document.getElementById('pref-style').value,
      priority: document.getElementById('pref-priority').value,
    });
    toast('Preferences saved');
  } catch(e) { toast('Could not save — try again', 'error'); }
}

/* ── Book Now modal ── */
let _bookingProviderId = null;
// keyed by providerId so onclick just passes the id
const _providerServicesMap = {};

function openBookModal(providerId) {
  _bookingProviderId = providerId;
  const p = _providers.find(x => x.id === providerId) || {};
  document.getElementById('bookProviderName').textContent = p.profiles?.full_name || 'Provider';
  const svcs = (p.services || []);
  document.getElementById('bookService').innerHTML = svcs.length
    ? svcs.map(s => `<option value="${s.id}">${s.name} — £${s.price}</option>`).join('')
    : '<option value="">No services listed</option>';
  document.getElementById('bookDate').value = '';
  document.getElementById('bookMessage').value = '';
  document.getElementById('bookModal').classList.remove('hidden');
}
function closeBookModal() { document.getElementById('bookModal').classList.add('hidden'); }
async function submitBooking() {
  const btn = document.getElementById('bookConfirmBtn');
  const serviceId = document.getElementById('bookService').value;
  const date      = document.getElementById('bookDate').value;
  const message   = document.getElementById('bookMessage').value.trim();
  if (!serviceId) { toast('Please select a service', 'error'); return; }
  if (!date)      { toast('Please pick a date', 'error'); return; }
  btn.disabled = true; btn.textContent = 'Sending…';
  try {
    if (!preview) {
      await Bookings.create({ provider_id: _bookingProviderId, service_id: serviceId, scheduled_date: date, message });
    }
    closeBookModal();
    toast('Booking request sent!');
    /* add to local list so Bookings tab reflects it immediately */
    const sel = document.getElementById('bookService');
    _bookings.unshift({ id:'new-'+Date.now(), status:'pending', created_at: new Date().toISOString(),
      profiles:{ full_name: document.getElementById('bookProviderName').textContent },
      services:{ name: sel.options[sel.selectedIndex]?.text?.split(' — ')[0] || 'Service' } });
  } catch(e) { toast('Could not send request — try again', 'error'); }
  btn.disabled = false; btn.textContent = 'Send request';
}

function providerMatchCard(b) {
  const profile  = b.profiles || {};
  const name     = profile.full_name || 'Client';
  const initials = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const job      = b.services?.name || b.message?.slice(0,40) || 'Job request';
  const price    = b.services?.price ? `· £${b.services.price}` : '';
  return `
    <div class="pm-card" id="pm-${b.id}">
      <div class="pm-head">
        ${profile.avatar_url
          ? `<img class="pm-av" src="${profile.avatar_url}" alt="${name}" style="border-radius:50%">`
          : `<div class="pm-av ${avColor(name)}">${initials}</div>`}
        <div><div class="pm-name">${name}</div><div class="pm-job">${job} ${price}</div></div>
      </div>
      <div class="pm-tags">
        <span class="pm-tag">Prefers friendly communication</span>
        <span class="pm-tag">Values trust and quality</span>
      </div>
      <div class="pm-badge">
        <span class="pm-badge-dot"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>
        Strong match
      </div>
      <div class="pm-explain">${ICO.info}
        <p>Strong match based on your communication rating and past experience with similar requests.</p>
      </div>
      <div class="pm-ad">
        <button class="btn-accept" onclick="updateBookingStatus('${b.id}','confirmed',this)">Accept</button>
        <button class="btn-decline" onclick="updateBookingStatus('${b.id}','cancelled',this)">Decline</button>
      </div>
    </div>`;
}

async function updateBookingStatus(bookingId, newStatus, btn) {
  btn.disabled = true;
  const label = newStatus==='confirmed' ? 'Accepting…' : newStatus==='completed' ? 'Completing…' : 'Declining…';
  btn.textContent = label;
  try {
    if (!preview) await Bookings.updateStatus(bookingId, newStatus);
    /* update local state */
    const bk = _bookings.find(b=>b.id===bookingId);
    if (bk) bk.status = newStatus;
    if (newStatus==='completed') {
      /* update the card in-place: swap badge + remove button */
      const card = document.getElementById(`pm-${bookingId}`);
      if (card) {
        const badge = card.querySelector('.bk-status');
        if (badge) { badge.className='bk-status completed'; badge.textContent='Completed'; }
        const actions = card.querySelector('.bk-actions');
        if (actions) actions.remove();
      }
      toast('Job marked complete — great work!');
    } else {
      /* remove card from the matches/requests grid */
      const card = document.getElementById(`pm-${bookingId}`);
      if (card) { card.style.transition='opacity .3s'; card.style.opacity='0'; setTimeout(()=>card.remove(),300); }
      toast(newStatus==='confirmed' ? 'Request accepted — check Jobs for details' : 'Request declined');
    }
    /* update notification badge count */
    const stillPending = _bookings.filter(b=>b.status==='pending').length;
    const badge = document.querySelector('.notif-count');
    if (badge) { badge.textContent = stillPending>0?(stillPending>9?'9+':stillPending):''; if(!stillPending) badge.remove(); }
  } catch(e) {
    toast('Could not update — try again', 'error');
    btn.disabled=false;
    btn.textContent = newStatus==='confirmed'?'Accept':newStatus==='completed'?'Mark complete':'Decline';
  }
}

/* ══════════════════════════════════════════════════════════
   SPARKLINE
══════════════════════════════════════════════════════════ */
function buildSparkline(vouches) {
  const pts  = vouches.length ? vouches.slice(-8) : [{rating:4.5},{rating:4.7},{rating:4.8},{rating:4.9},{rating:5.0}];
  const xs   = pts.map((_,i)=>(i/Math.max(pts.length-1,1))*190+5);
  const ys   = pts.map(v=>48-((v.rating/5)*38));
  const path = xs.map((x,i)=>`${i===0?'M':'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const area = `${path} L${xs[xs.length-1].toFixed(1)},52 L5,52 Z`;
  return `<svg class="sparkline" viewBox="0 0 200 52" preserveAspectRatio="none">
    <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1D9E75" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#sg)"/>
    <path d="${path}" stroke="#1D9E75" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${xs[xs.length-1].toFixed(1)}" cy="${ys[ys.length-1].toFixed(1)}" r="3.5" fill="#1D9E75"/>
  </svg>`;
}
