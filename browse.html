<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Providers — Sowo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --green:#085041;--teal:#1D9E75;--mint:#9FE1CB;--amber:#EF9F27;--amber-dk:#8B5E0A;
  --black:#0A0A0A;--cream:#F5F0E8;--white:#fff;
  --t1:#0A0A0A;--t2:#555;--t3:#999;--border:#E8E8E8;--surf:#F6F6F6;
  --ease:cubic-bezier(.16,1,.3,1)
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--white);color:var(--t1);overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:500;height:68px;padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;
  background:#fff;border-bottom:1px solid var(--border);
}
.logo{display:flex;align-items:center;gap:8px}
.logo-wm{font-family:Georgia,serif;font-size:19px;font-weight:700;color:var(--black)}
.nav-links{display:flex;gap:28px}
.nav-links a{font-size:13px;font-weight:500;color:var(--t2);transition:color .15s}
.nav-links a:hover{color:var(--black)}
.nav-links a.active{color:var(--green);font-weight:700}
.nav-r{display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-size:14px;font-weight:600;border-radius:10px;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn-sm{height:38px;padding:0 16px;font-size:13px}
.b-green{background:var(--green);color:var(--mint)}.b-green:hover{background:#063D31}
.b-amber{background:var(--amber);color:var(--black)}.b-amber:hover{background:#D4891F}
.b-light{background:transparent;color:var(--t2);border:1px solid var(--border)}.b-light:hover{border-color:var(--teal);color:var(--black)}
.ham{display:none;flex-direction:column;gap:5px;padding:6px;background:none;border:none}
.ham span{display:block;width:22px;height:1.5px;background:var(--black);border-radius:2px}

/* HERO SEARCH BAR */
.search-hero{
  background:var(--black);margin-top:68px;
  padding:48px 40px 52px;
}
.search-hero h1{font-size:clamp(24px,4vw,38px);font-weight:900;color:#fff;letter-spacing:-.5px;margin-bottom:6px}
.search-hero p{font-size:15px;color:rgba(255,255,255,.45);margin-bottom:28px}
.search-bar{
  display:flex;gap:10px;max-width:680px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:14px;padding:6px 6px 6px 16px;
}
.search-bar input{
  flex:1;background:none;border:none;outline:none;font-size:15px;
  font-family:inherit;color:#fff;min-width:0;
}
.search-bar input::placeholder{color:rgba(255,255,255,.3)}
.search-bar-btn{
  height:44px;padding:0 22px;background:var(--amber);color:var(--black);
  border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;
  transition:background .15s;flex-shrink:0;
}
.search-bar-btn:hover{background:#D4891F}

/* FILTER CHIPS */
.filters{padding:20px 40px;border-bottom:1px solid var(--border);background:#fff;overflow-x:auto;display:flex;gap:8px;align-items:center}
.filters::-webkit-scrollbar{display:none}
.chip{
  height:34px;padding:0 14px;border-radius:999px;font-size:13px;font-weight:600;
  background:var(--surf);color:var(--t2);border:1px solid var(--border);
  cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.chip:hover{border-color:var(--teal);color:var(--black)}
.chip.active{background:var(--green);color:var(--mint);border-color:var(--green)}
.filter-count{font-size:13px;color:var(--t3);margin-left:8px;flex-shrink:0;white-space:nowrap}

/* SORT */
.browse-header{display:flex;align-items:center;justify-content:space-between;padding:20px 40px 0}
.browse-header h2{font-size:15px;font-weight:600;color:var(--t2)}
.browse-header span{color:var(--black);font-weight:700}
.sort-select{
  height:36px;padding:0 12px;border:1px solid var(--border);border-radius:8px;
  font-size:13px;font-family:inherit;color:var(--t1);background:#fff;cursor:pointer;outline:none;
}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;padding:20px 40px 60px}

/* PROVIDER CARD */
.pcard{
  border:1px solid var(--border);border-radius:16px;overflow:hidden;
  background:#fff;transition:transform .2s var(--ease),box-shadow .2s;cursor:pointer;
  display:flex;flex-direction:column;
}
.pcard:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.1)}
.pcard-top{padding:20px 20px 16px;display:flex;align-items:flex-start;gap:14px}
.pcard-avatar{width:56px;height:56px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--surf)}
.pcard-avatar-init{
  width:56px;height:56px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;color:var(--mint);background:var(--green);
}
.pcard-info{flex:1;min-width:0}
.pcard-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard-cat{font-size:12px;color:var(--t3);margin-top:2px}
.pcard-loc{font-size:12px;color:var(--t3);margin-top:2px;display:flex;align-items:center;gap:4px}
.pcard-stars{color:var(--amber);font-size:13px;margin-top:4px}
.pcard-rating{font-size:12px;color:var(--t3);font-weight:600;margin-left:4px}

.pcard-mid{padding:0 20px 14px}
.pcard-bio{font-size:13px;color:var(--t2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.pcard-skills{padding:0 20px;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.skill-tag{
  height:24px;padding:0 10px;border-radius:999px;
  background:var(--surf);color:var(--t2);border:1px solid var(--border);font-size:11px;font-weight:600;
}

.pcard-foot{
  margin-top:auto;padding:14px 20px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.pcard-price{font-size:18px;font-weight:800;color:var(--black)}
.pcard-price span{font-size:12px;font-weight:500;color:var(--t3)}
.pcard-vouch{font-size:12px;color:var(--t3);display:flex;align-items:center;gap:4px}
.pcard-cta{
  height:34px;padding:0 16px;background:var(--green);color:var(--mint);
  border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;
  transition:background .15s;
}
.pcard-cta:hover{background:#063D31}

/* VERIFIED BADGE */
.verified-badge{display:inline-flex;align-items:center;gap:4px;background:#E6F9F3;color:var(--teal);border-radius:999px;padding:2px 8px;font-size:10px;font-weight:700;margin-top:4px}

/* LOADING / EMPTY */
.skeleton{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sk-card{border:1px solid var(--border);border-radius:16px;padding:20px}
.sk-line{background:var(--surf);border-radius:6px;margin-bottom:10px}
.sk-avatar{width:56px;height:56px;background:var(--surf);border-radius:50%;margin-bottom:12px}

.empty-state{grid-column:1/-1;text-align:center;padding:80px 20px}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-title{font-size:20px;font-weight:700;margin-bottom:8px}
.empty-msg{font-size:14px;color:var(--t3)}

/* LOAD MORE */
.load-more-wrap{text-align:center;padding:0 0 60px}
.btn-load{
  height:46px;padding:0 32px;background:var(--surf);color:var(--t1);
  border:1px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;
  transition:all .15s;cursor:pointer;
}
.btn-load:hover{border-color:var(--teal);color:var(--green)}

/* RESPONSIVE */
@media(max-width:768px){
  .nav{padding:0 20px}
  .nav-links{display:none}
  .ham{display:flex}
  .search-hero{padding:32px 20px 36px}
  .filters{padding:16px 20px}
  .grid{padding:16px 20px 40px;grid-template-columns:1fr}
  .browse-header{padding:16px 20px 0}
}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="logo"><span class="logo-wm">Sowo</span></a>
  <div class="nav-links">
    <a href="/browse" class="active">Browse</a>
    <a href="/become-provider">Become a provider</a>
    <a href="/how-it-works">How it works</a>
  </div>
  <div class="nav-r" id="navR">
    <a href="/login" class="btn btn-sm b-light">Log in</a>
    <a href="/signup" class="btn btn-sm b-amber">Sign up</a>
  </div>
  <button class="ham" id="ham"><span></span><span></span><span></span></button>
</nav>

<section class="search-hero">
  <h1>Find trusted hands, near you</h1>
  <p>Vouched-for professionals from your community — cleaners, plumbers, tutors and more.</p>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search by skill, name, or category…" autocomplete="off">
    <button class="search-bar-btn" id="searchBtn">Search</button>
  </div>
</section>

<div class="filters" id="filters">
  <div class="chip active" data-cat="all">All categories</div>
</div>

<div class="browse-header">
  <h2>Showing <span id="countLabel">…</span> providers</h2>
  <select class="sort-select" id="sortSelect">
    <option value="vouches">Most vouched</option>
    <option value="rating">Highest rated</option>
    <option value="price_asc">Price: Low to high</option>
    <option value="price_desc">Price: High to low</option>
  </select>
</div>

<div class="grid" id="grid">
  <!-- Skeleton loaders -->
  <div class="sk-card skeleton"><div class="sk-avatar"></div><div class="sk-line" style="height:16px;width:60%"></div><div class="sk-line" style="height:12px;width:40%"></div><div class="sk-line" style="height:12px;width:80%;margin-top:16px"></div><div class="sk-line" style="height:12px;width:70%"></div></div>
  <div class="sk-card skeleton"><div class="sk-avatar"></div><div class="sk-line" style="height:16px;width:55%"></div><div class="sk-line" style="height:12px;width:45%"></div><div class="sk-line" style="height:12px;width:75%;margin-top:16px"></div><div class="sk-line" style="height:12px;width:65%"></div></div>
  <div class="sk-card skeleton"><div class="sk-avatar"></div><div class="sk-line" style="height:16px;width:65%"></div><div class="sk-line" style="height:12px;width:35%"></div><div class="sk-line" style="height:12px;width:80%;margin-top:16px"></div><div class="sk-line" style="height:12px;width:60%"></div></div>
</div>

<div class="load-more-wrap" id="loadMoreWrap" style="display:none">
  <button class="btn-load" id="loadMoreBtn">Load more providers</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/sowo.js"></script>
<script>
let currentQuery    = '';
let currentCategory = 'all';
let currentSort     = 'vouches';
let currentOffset   = 0;
const PAGE_SIZE     = 18;
let totalCount      = 0;

/* ── Build category chips ─────────────────────────────────── */
const filtersEl = document.getElementById('filters');
CATEGORIES.forEach(cat => {
  const chip = document.createElement('div');
  chip.className = 'chip';
  chip.dataset.cat = cat;
  chip.textContent = cat;
  filtersEl.appendChild(chip);
});

filtersEl.addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  currentCategory = chip.dataset.cat;
  currentOffset = 0;
  loadProviders(true);
});

/* ── Search ───────────────────────────────────────────────── */
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentQuery  = e.target.value.trim();
    currentOffset = 0;
    loadProviders(true);
  }, 350);
});
document.getElementById('searchBtn').addEventListener('click', () => {
  currentQuery  = document.getElementById('searchInput').value.trim();
  currentOffset = 0;
  loadProviders(true);
});
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('searchBtn').click();
});

/* ── Sort ─────────────────────────────────────────────────── */
document.getElementById('sortSelect').addEventListener('change', e => {
  currentSort   = e.target.value;
  currentOffset = 0;
  loadProviders(true);
});

/* ── Load providers ───────────────────────────────────────── */
async function loadProviders(reset = false) {
  if (reset) {
    currentOffset = 0;
    document.getElementById('grid').innerHTML = '';
  }

  try {
    let q = sb
      .from('providers')
      .select(`
        id, bio, category, skills, hourly_rate, vouch_count, rating, verified, available,
        profiles ( id, full_name, avatar_url, location )
      `, { count: 'exact' })
      .eq('available', true)
      .range(currentOffset, currentOffset + PAGE_SIZE - 1);

    if (currentCategory !== 'all') q = q.eq('category', currentCategory);
    if (currentQuery) q = q.or(`bio.ilike.%${currentQuery}%,category.ilike.%${currentQuery}%`);

    switch (currentSort) {
      case 'rating':      q = q.order('rating',      { ascending: false }); break;
      case 'price_asc':   q = q.order('hourly_rate',  { ascending: true  }); break;
      case 'price_desc':  q = q.order('hourly_rate',  { ascending: false }); break;
      default:            q = q.order('vouch_count',  { ascending: false });
    }

    const { data, error, count } = await q;
    if (error) throw error;

    totalCount = count || 0;
    document.getElementById('countLabel').textContent = totalCount.toLocaleString();

    const grid = document.getElementById('grid');
    if (reset) grid.innerHTML = '';

    if (!data || data.length === 0) {
      if (currentOffset === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <div class="empty-title">No providers found</div>
            <p class="empty-msg">Try a different search or category.</p>
          </div>`;
      }
    } else {
      data.forEach(p => grid.appendChild(buildCard(p)));
      currentOffset += data.length;
    }

    // Load more button
    const lmw = document.getElementById('loadMoreWrap');
    lmw.style.display = currentOffset < totalCount ? 'block' : 'none';

  } catch (err) {
    console.error(err);
    // Show demo cards if Supabase isn't configured yet
    if (currentOffset === 0) renderDemoCards();
  }
}

/* ── Build a provider card ────────────────────────────────── */
function buildCard(p) {
  const profile = p.profiles || {};
  const name    = profile.full_name  || 'Provider';
  const loc     = profile.location   || 'London';
  const initials= name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const price   = p.hourly_rate ? UI.formatPrice(p.hourly_rate) + '<span>/hr</span>' : '<span>Contact for price</span>';
  const stars   = p.rating ? UI.stars(p.rating) : '☆☆☆☆☆';
  const skills  = (p.skills || []).slice(0,3).map(s => `<span class="skill-tag">${s}</span>`).join('');

  const div = document.createElement('div');
  div.className = 'pcard';
  div.innerHTML = `
    <div class="pcard-top">
      ${profile.avatar_url
        ? `<img class="pcard-avatar" src="${profile.avatar_url}" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''}
      <div class="pcard-avatar-init" ${profile.avatar_url ? 'style="display:none"' : ''}>${initials}</div>
      <div class="pcard-info">
        <div class="pcard-name">${name}</div>
        <div class="pcard-cat">${p.category || 'Service Provider'}</div>
        <div class="pcard-loc">📍 ${loc}</div>
        <div class="pcard-stars">${stars} <span class="pcard-rating">${p.rating ? p.rating + ' · ' + p.vouch_count + ' vouches' : 'New provider'}</span></div>
        ${p.verified ? '<div class="verified-badge">✓ Verified</div>' : ''}
      </div>
    </div>
    ${p.bio ? `<div class="pcard-mid"><p class="pcard-bio">${p.bio}</p></div>` : ''}
    ${skills ? `<div class="pcard-skills">${skills}</div>` : ''}
    <div class="pcard-foot">
      <div class="pcard-price">${price}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="pcard-vouch">✦ ${p.vouch_count || 0} vouches</span>
        <button class="pcard-cta" onclick="window.location='/provider?id=${p.id}'">View →</button>
      </div>
    </div>
  `;
  div.addEventListener('click', e => {
    if (!e.target.closest('.pcard-cta')) {
      window.location = '/provider?id=' + p.id;
    }
  });
  return div;
}

/* ── Load more ─────────────────────────────────────────────── */
document.getElementById('loadMoreBtn').addEventListener('click', () => loadProviders(false));

/* ── Demo cards (shown before Supabase is wired up) ────────── */
function renderDemoCards() {
  const DEMOS = [
    { name:'Kwame Asante', cat:'Plumber', loc:'Peckham, London', rating:4.9, vouches:62, price:3500, bio:'Fully qualified plumber. Fast response, no callout fee on weekdays.', skills:['Leaks','Boilers','Bathrooms'], verified:true },
    { name:'Ngozi Williams', cat:'Cleaner', loc:'Hackney, London', rating:5.0, vouches:88, price:1800, bio:'Eco-friendly deep cleaning for homes and offices. References available.', skills:['Deep clean','Move-out','Weekly'], verified:true },
    { name:'Seun Adeyemi', cat:'Electrician', loc:'Tottenham, London', rating:4.8, vouches:41, price:4200, bio:'18th Edition qualified electrician. All work certified.', skills:['Rewiring','Fault finding','EV charging'], verified:false },
    { name:'Ama Darko', cat:'Tutor', loc:'Brixton, London', rating:4.9, vouches:35, price:2500, bio:'Maths + Sciences tutor. GCSE and A-Level specialist. Flexible hours.', skills:['Maths','Physics','Chemistry'], verified:true },
    { name:'Tunde Bello', cat:'Carpenter', loc:'Stratford, London', rating:4.7, vouches:29, price:3800, bio:'Bespoke furniture and fitted wardrobes. 10+ years experience.', skills:['Wardrobes','Kitchens','Floors'], verified:false },
    { name:'Fatima Al-Hassan', cat:'Painter', loc:'Lewisham, London', rating:4.8, vouches:54, price:2200, bio:'Interior and exterior painting. Clean, neat, reliable.', skills:['Interior','Exterior','Feature walls'], verified:true },
  ];

  document.getElementById('countLabel').textContent = DEMOS.length;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  DEMOS.forEach((d, i) => {
    const initials = d.name.split(' ').map(w=>w[0]).join('').toUpperCase();
    const stars = UI.stars(d.rating);
    const price = UI.formatPrice(d.price);
    const div = document.createElement('div');
    div.className = 'pcard';
    div.innerHTML = `
      <div class="pcard-top">
        <div class="pcard-avatar-init">${initials}</div>
        <div class="pcard-info">
          <div class="pcard-name">${d.name}</div>
          <div class="pcard-cat">${d.cat}</div>
          <div class="pcard-loc">📍 ${d.loc}</div>
          <div class="pcard-stars">${stars} <span class="pcard-rating">${d.rating} · ${d.vouches} vouches</span></div>
          ${d.verified ? '<div class="verified-badge">✓ Verified</div>' : ''}
        </div>
      </div>
      <div class="pcard-mid"><p class="pcard-bio">${d.bio}</p></div>
      <div class="pcard-skills">${d.skills.map(s=>`<span class="skill-tag">${s}</span>`).join('')}</div>
      <div class="pcard-foot">
        <div class="pcard-price">${price}<span>/hr</span></div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="pcard-vouch">✦ ${d.vouches} vouches</span>
          <button class="pcard-cta" onclick="alert('Connect Supabase to enable profiles')">View →</button>
        </div>
      </div>
    `;
    grid.appendChild(div);
  });
}

/* ── Update nav for logged-in user ─────────────────────────── */
Auth.getUser().then(user => {
  if (user) {
    document.getElementById('navR').innerHTML = `
      <a href="/dashboard" class="btn btn-sm b-green">Dashboard</a>
    `;
  }
});

/* ── Init ──────────────────────────────────────────────────── */
loadProviders(true);
</script>
</body>
</html>
