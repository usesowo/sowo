<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — Sowo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,600;9..144,1,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--green:#085041;--teal:#1D9E75;--mint:#9FE1CB;--amber:#EF9F27;--black:#0A0A0A;--white:#fff;--ease:cubic-bezier(.16,1,.3,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--black);color:#fff;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none}

.nav{height:64px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07)}
.logo{display:flex;align-items:center;gap:8px}
.logo-wm{font-family:'Fraunces',Georgia,serif;font-size:22px;font-weight:600;letter-spacing:-.02em;color:#fff}
.nav-hint{font-size:13px;color:rgba(255,255,255,.4)}
.nav-hint a{color:var(--amber);font-weight:600}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{width:100%;max-width:460px;background:#111;border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:40px 36px}
.card-title{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.card-sub{font-size:14px;color:rgba(255,255,255,.45);margin-bottom:8px}
.card-sub a{color:var(--amber);font-weight:600}

/* ROLE SELECTOR */
.role-pick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0 28px}
.role-btn{
  padding:14px 12px;border-radius:12px;cursor:pointer;
  background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.08);
  text-align:left;transition:all .2s;
}
.role-btn:hover{background:rgba(255,255,255,.09)}
.role-btn.active-consumer{border-color:var(--amber);background:rgba(239,159,39,.08)}
.role-btn.active-provider{border-color:var(--teal);background:rgba(29,158,117,.08)}
.role-icon{font-size:22px;margin-bottom:6px}
.role-label{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}
.role-desc{font-size:11px;color:rgba(255,255,255,.35)}

.field{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:600;color:rgba(255,255,255,.55);margin-bottom:6px}
input[type=email],input[type=password],input[type=text]{
  width:100%;height:48px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.12);border-radius:10px;
  padding:0 14px;font-size:15px;font-family:inherit;color:#fff;
  transition:border-color .2s;outline:none;
}
input::placeholder{color:rgba(255,255,255,.25)}
input:focus{border-color:var(--teal)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,.35);font-size:14px}
.pw-toggle:hover{color:#fff}

.strength{height:3px;border-radius:3px;background:rgba(255,255,255,.08);margin-top:7px;overflow:hidden}
.strength-bar{height:100%;border-radius:3px;transition:width .3s,background .3s}

.terms-row{display:flex;align-items:flex-start;gap:10px;margin:18px 0 22px;font-size:13px;color:rgba(255,255,255,.4);line-height:1.5}
.terms-row input[type=checkbox]{width:16px;height:16px;margin-top:2px;flex-shrink:0;accent-color:var(--amber)}
.terms-row a{color:var(--amber)}

.btn-submit{
  width:100%;height:50px;background:var(--amber);color:var(--black);
  border-radius:12px;font-size:15px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background .18s,transform .12s;
}
.btn-submit:hover{background:#D4891F}
.btn-submit:active{transform:scale(.97)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}

.spin{width:18px;height:18px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

.divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:rgba(255,255,255,.2);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
.btn-google{
  width:100%;height:48px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:12px;font-size:14px;font-weight:600;color:rgba(255,255,255,.7);
  display:flex;align-items:center;justify-content:center;gap:10px;transition:all .18s;
}
.btn-google:hover{background:rgba(255,255,255,.11);color:#fff}
.btn-google svg{width:18px;height:18px}

.error-msg{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);border-radius:8px;padding:12px 14px;font-size:13px;color:#f88;margin-bottom:18px;display:none}
.error-msg.show{display:block}

.success-state{text-align:center;padding:20px 0}
.success-icon{font-size:48px;margin-bottom:16px}
.success-title{font-size:22px;font-weight:800;margin-bottom:8px}
.success-msg{font-size:14px;color:rgba(255,255,255,.5);line-height:1.6}

footer{text-align:center;padding:24px;font-size:12px;color:rgba(255,255,255,.2)}
footer a{color:rgba(255,255,255,.35)}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="logo"><span class="logo-wm">Sowo</span></a>
  <span class="nav-hint">Already have an account? <a href="/login">Log in</a></span>
</nav>

<main>
  <div class="card" id="mainCard">
    <h1 class="card-title">Create your account</h1>
    <p class="card-sub">Already on Sowo? <a href="/login">Log in →</a></p>

    <div class="role-pick">
      <button class="role-btn active-consumer" id="roleConsumer" data-role="consumer">
        <div class="role-icon">🔍</div>
        <div class="role-label">I need help</div>
        <div class="role-desc">Find trusted professionals</div>
      </button>
      <button class="role-btn" id="roleProvider" data-role="provider">
        <div class="role-icon">🔨</div>
        <div class="role-label">I offer services</div>
        <div class="role-desc">Get hired in your community</div>
      </button>
    </div>

    <div class="error-msg" id="err"></div>

    <form id="signupForm" novalidate>
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" placeholder="Amara Okafor" required autocomplete="name">
      </div>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Create a strong password" required minlength="8" autocomplete="new-password">
          <button type="button" class="pw-toggle" id="pwToggle">👁</button>
        </div>
        <div class="strength"><div class="strength-bar" id="strengthBar" style="width:0%"></div></div>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="terms" required>
        <label for="terms" style="color:rgba(255,255,255,.4)">
          I agree to Sowo's <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a>
        </label>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Create account</button>
    </form>

    <div class="divider">or continue with</div>
    <button class="btn-google" id="googleBtn">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
  </div>
</main>

<footer>
  <a href="/privacy">Privacy</a> · <a href="/terms">Terms</a> · © 2025 Sowo Ltd
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/sowo.js"></script>
<script>
let selectedRole = 'consumer';

// Role selection
document.querySelectorAll('.role-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active-consumer','active-provider'));
    selectedRole = btn.dataset.role;
    btn.classList.add(selectedRole === 'consumer' ? 'active-consumer' : 'active-provider');
  });
});

// Password strength
document.getElementById('password').addEventListener('input', e => {
  const pw  = e.target.value;
  const bar = document.getElementById('strengthBar');
  let score = 0;
  if (pw.length >= 8)  score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const w = [0, 25, 50, 75, 100][score];
  const c = ['','#c0392b','#f39c12','#2ecc71','#085041'][score];
  bar.style.width = w + '%';
  bar.style.background = c;
});

// Password visibility
const pwInput = document.getElementById('password');
document.getElementById('pwToggle').addEventListener('click', () => {
  const show = pwInput.type === 'password';
  pwInput.type = show ? 'text' : 'password';
  document.getElementById('pwToggle').textContent = show ? '🙈' : '👁';
});

// Form submit
document.getElementById('signupForm').addEventListener('submit', async e => {
  e.preventDefault();
  const err = document.getElementById('err');
  err.classList.remove('show');

  const name     = document.getElementById('name').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = pwInput.value;
  const terms    = document.getElementById('terms').checked;

  if (!terms) {
    err.textContent = 'Please agree to the Terms of Service.';
    err.classList.add('show');
    return;
  }
  if (password.length < 8) {
    err.textContent = 'Password must be at least 8 characters.';
    err.classList.add('show');
    return;
  }

  const btn = document.getElementById('submitBtn');
  UI.setLoading(btn, true);

  try {
    const data = await Auth.signUp(email, password, name);

    // If provider, redirect to become-provider after email confirm
    // Store intent so we redirect properly after confirmation
    localStorage.setItem('sowo_signup_role', selectedRole);

    // Pull the ?next= intent so the success copy + post-login destination match
    const nextParam = new URLSearchParams(location.search).get('next');
    let intentLine = '';
    if (nextParam === 'post') {
      try {
        const drafts = JSON.parse(localStorage.getItem('sowo_request_drafts') || '[]');
        if (drafts.length) intentLine = `Your ${drafts.length === 1 ? 'request is' : drafts.length + ' requests are'} saved and will publish the moment you sign in.`;
      } catch(e) {}
    } else if (nextParam === 'list') {
      intentLine = 'Your provider listing is saved and will go live as soon as you sign in.';
    }

    // Show success state
    document.getElementById('mainCard').innerHTML = `
      <div class="success-state">
        <div class="success-icon">✉️</div>
        <div class="success-title">Check your email</div>
        <p class="success-msg">
          We sent a confirmation link to <strong>${email}</strong>.<br><br>
          Click the link to activate your account, then come back to log in.
          ${intentLine ? '<br><br><strong>' + intentLine + '</strong>' : ''}
        </p>
      </div>
    `;
  } catch (error) {
    err.textContent = error.message || 'Sign up failed. Try again.';
    err.classList.add('show');
    UI.setLoading(btn, false);
  }
});

// Google OAuth
document.getElementById('googleBtn').addEventListener('click', async () => {
  const nextParam = new URLSearchParams(location.search).get('next');
  const nextSuffix = nextParam ? '?next=' + nextParam : '';
  const redirect = selectedRole === 'provider'
    ? window.location.origin + '/become-provider.html' + nextSuffix
    : window.location.origin + '/dashboard.html' + nextSuffix;
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options:  { redirectTo: redirect }
  });
  if (error) UI.toast(error.message, 'error');
});

// Forward ?next= across the signup→login cross-links so context survives a click
(function(){
  const nextParam = new URLSearchParams(location.search).get('next');
  if (!nextParam) return;
  document.querySelectorAll('a[href^="/login"]').forEach(a => {
    const href = a.getAttribute('href');
    a.setAttribute('href', href + (href.includes('?') ? '&' : '?') + 'next=' + nextParam);
  });
})();

// Already logged in? Honour the next= param so they don't land in the wrong place.
Auth.getUser().then(user => {
  if (user) {
    const nextParam = new URLSearchParams(location.search).get('next');
    if (nextParam === 'post') window.location.href = '/requests.html';
    else if (nextParam === 'list') window.location.href = '/become-provider.html?next=list';
    else window.location.href = '/dashboard.html';
  }
});
</script>
</body>
</html>
